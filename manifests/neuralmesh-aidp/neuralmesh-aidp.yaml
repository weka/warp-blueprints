# =============================================================================
# WEKA AIDP Blueprint (WEKA App Store)
# =============================================================================
# Generated from appstack/weka-aidp-appstack.yaml. Deploys the full AIDP
# platform (Keycloak, Milvus, NVIDIA RAG Blueprint + NIMs, observability, and
# the AIDP services) into the `rag` namespace.
#
# Uses the WEKA App Store credential feature:
#   - nvidia-ngc  credential -> materializes ngc-secret + ngc-api in `rag`
#   - weka-storage credential -> WEKA REST API token for the AIDP operator
# WEKA S3 access/secret keys are collected as form fields (not covered by the
# weka-storage credential type) and substituted by the operator via ${VAR}.
# =============================================================================
x-variables:
  namespace:
    type: string
    required: true
    description: "Kubernetes namespace to deploy AIDP into (created automatically if it does not exist). Choose an existing namespace from the dropdown or type a new one."
    placeholder: "e.g. rag"
  ngc_credential:
    type: credential
    credential_type: nvidia-ngc
    required: true
    description: "NVIDIA NGC credential. Pulls NIM container images from nvcr.io and provides the NGC API key to the model-serving NIMs. Register it on the Settings page."
  weka_credential:
    type: credential
    credential_type: weka-storage
    required: true
    description: "WEKA storage credential. Provides the WEKA REST API token used by the AIDP operator / Space Manager to manage filesystems. Register it on the Settings page."
  weka_s3_access_key:
    type: string
    required: true
    description: "WEKA S3 access key. Milvus and the NVIDIA ingestion pipeline use this to read/write the aidp-bucket over the WEKA S3 (MinIO-compatible) endpoint."
    placeholder: "e.g. 0ABCDEF1234567890XYZ"
  weka_s3_secret_key:
    type: string
    required: true
    description: "WEKA S3 secret key paired with the access key above."
    placeholder: "e.g. abcd1234efgh5678ijkl9012mnop3456"
  weka_s3_node_ips:
    type: string
    required: true
    description: "Comma- or space-separated WEKA S3 node IPs. The nginx S3 load balancer fans out across these on port 9000. Enumerate with: weka cluster nodes --role S3"
    placeholder: "e.g. 192.168.1.1, 192.168.1.2, 192.168.1.3"
  weka_api_host:
    type: string
    required: true
    description: "WEKA cluster management IP/host for the REST API. Space Manager and the operator derive all WEKA API URLs from this (port 14000 is assumed)."
    placeholder: "e.g. 172.3.4.248"
  keycloak_fqdn:
    type: string
    required: true
    description: "External Keycloak FQDN used for browser OIDC login."
    placeholder: "e.g. keycloak.example.com"
  gui_base_url:
    type: string
    required: true
    description: "External URL of the AIDP GUI. The Keycloak OIDC redirect URI is derived from this."
    placeholder: "e.g. https://aidp.example.com"
  attu_hostname:
    type: string
    required: true
    description: "External FQDN for the Milvus Attu admin UI (exposed via the Envoy HTTPRoute)."
    placeholder: "e.g. attu.example.com"
  cluster_fqdn:
    type: string
    required: true
    description: "Cluster domain used to derive the Phoenix observability hostname (phoenix.<domain>)."
    placeholder: "e.g. example.com"
  vectordb_filesystem_name:
    type: string
    required: true
    description: "Human-readable WEKA filesystem name backing the vector DB (as shown in the WEKA console)."
    placeholder: "e.g. vectordb"

# =============================================================================
# WEKA AIDP AppStack Blueprint
# =============================================================================
# What: WekaAppStore CR that orchestrates the complete AIDP platform deployment
#       via the WEKA App Store operator.
#
# Prerequisites (must exist BEFORE applying this file):
#   1. ConfigMap aidp-site-config in namespace rag
#      (apply appstack/aidp-site-config.yaml after filling in all <replace-me>
#       values)
#   2. All required Kubernetes Secrets — see appstack/required-secrets.md
#   3. ConfigMap keycloak-realm-config in namespace keycloak
#      (applied by the AIDP Helm chart's post-install hook)
#
# Apply:
#   kubectl apply -f appstack/aidp-site-config.yaml
#   kubectl apply -f appstack/weka-aidp-appstack.yaml
# =============================================================================

apiVersion: warp.io/v1alpha1
kind: WekaAppStore
metadata:
  name: weka-aidp
  namespace: "[[ namespace ]]"
spec:
  appStack:
    # Operator-layer variables. The App Store operator substitutes ${name}
    # for these names in kubernetesManifest strings and valuesFiles content,
    # and leaves every other shell ${...} / $(...) / $$ token untouched
    # (allowlist substitution). Only the WEKA S3 keys flow through this layer;
    # all other site-specific values are baked in by the GUI at install time.
    variables:
      wekaS3AccessKey: "[[ weka_s3_access_key ]]"
      wekaS3SecretKey: "[[ weka_s3_secret_key ]]"
    components:

      - name: aidp-site-config
        enabled: true
        dependsOn: []
        description: "Site-config ConfigMap (Keycloak / NVIDIA RAG / GPU profile / Milvus / observability / AIDP values) consumed by the Helm components via valuesFiles. Hostnames and IPs are filled from the install form; WEKA S3 keys are substituted by the operator via ${VAR}."
        kubernetesManifest: |
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: aidp-site-config
            namespace: ${namespace}
          data:
            # ------------------------------------------------------------------
            # Keycloak overrides
            # These values override the inline values in weka-aidp-appstack.yaml
            # and are applied as a Helm valuesFile to the codecentric/keycloakx chart.
            # ------------------------------------------------------------------
            keycloak-values: |
              # Keycloak external traffic flows via the Envoy Gateway HTTPRoute
              # in helm/aidp/templates/envoy/httproute-keycloak.yaml — not a classic
              # Kubernetes Ingress. The chart's bundled Ingress is disabled so the
              # two routes don't compete for the keycloak.example.com host (and so
              # any cluster-wide ingress controller doesn't accidentally hijack the
              # traffic intended for warp-edge-gateway).
              ingress:
                enabled: false

            # ------------------------------------------------------------------
            # NVIDIA RAG Blueprint overrides
            # Base NVIDIA RAG Blueprint configuration applied to nvidia-blueprint-rag.
            # Add NIM model variant overrides, feature toggles, resource tuning, etc.
            # The GPU profile (nvidia-gpu-profile key below) is merged separately.
            # ------------------------------------------------------------------
            nvidia-rag-values: |
              # NGC secrets are pre-created by appstack/aidp-secrets.yaml. Tell Helm not
              # to try creating them — it would fail with "Unable to continue with install:
              # Secret exists and cannot be imported into the current release".
              imagePullSecret:
                create: false
                name: "ngc-secret"
              ngcApiSecret:
                create: false
                name: "ngc-api"   # matches the pre-created Secret (nv-ingest hardcodes this name)

              # rag-server is the umbrella chart (fullnameOverride: "rag-server" in the
              # chart's own values.yaml) — its envVars live at the TOP level, not under
              # a "rag-server:" key. Override only GPU-specific defaults to match our
              # CPU-only external Milvus.
              # D-02/D-03: OTEL tracing wiring — both HTTP and gRPC endpoints per D-03.
              # Ref: OBSERVABILITY-PLAN §4.2. Targets Phase 37 customer-managed collector.
              envVars:
                APP_VECTORSTORE_URL: "http://milvus.${namespace}.svc.cluster.local:19530"
                APP_VECTORSTORE_NAME: "milvus"
                APP_VECTORSTORE_INDEXTYPE: "HNSW"           # was "GPU_CAGRA"
                APP_VECTORSTORE_ENABLEGPUSEARCH: "False"    # was "True"
                APP_EMBEDDINGS_SERVERURL: "embedding-proxy.${namespace}.svc.cluster.local:8000/v1"
                APP_TRACING_ENABLED: "True"
                APP_TRACING_OTLPGRPCENDPOINT: "otel-collector.${namespace}.svc.cluster.local:4317"
                APP_TRACING_OTLPHTTPENDPOINT: "http://otel-collector.${namespace}.svc.cluster.local:4318/v1/traces"
                OTEL_SERVICE_NAME: "rag-server"

              # Ingestor server subchart
              # D-02/D-03: OTEL tracing wiring — both HTTP and gRPC endpoints per D-03.
              # Ref: OBSERVABILITY-PLAN §4.3. Targets Phase 37 customer-managed collector.
              # NOTE: APP_TRACING_OTLPGRPCENDPOINT must be bare host:port (no grpc:// scheme).
              # The Python OTLPSpanExporter gRPC backend expects host:port; the grpc:// prefix
              # is a raw gRPC channel convention that causes the OTEL exporter to fail silently.
              ingestor-server:
                enabled: true
                envVars:
                  APP_VECTORSTORE_URL: "http://milvus.${namespace}.svc.cluster.local:19530"
                  APP_VECTORSTORE_NAME: "milvus"
                  APP_VECTORSTORE_ENABLEGPUINDEX: "False"   # was "True"
                  APP_VECTORSTORE_ENABLEGPUSEARCH: "False"  # was "True"
                  APP_EMBEDDINGS_SERVERURL: "embedding-proxy.${namespace}.svc.cluster.local:8000/v1"
                  MINIO_ENDPOINT: "nginx-s3-lb-service.${namespace}.svc.cluster.local:9000"
                  MINIO_BUCKET: "aidp-bucket"
                  NVINGEST_MINIO_BUCKET: "aidp-bucket"
                  MINIO_ACCESSKEY: "${wekaS3AccessKey}"
                  MINIO_SECRETKEY: "${wekaS3SecretKey}"
                  APP_TRACING_ENABLED: "True"
                  APP_TRACING_OTLPGRPCENDPOINT: "otel-collector.${namespace}.svc.cluster.local:4317"
                  APP_TRACING_OTLPHTTPENDPOINT: "http://otel-collector.${namespace}.svc.cluster.local:4318/v1/traces"
                  OTEL_SERVICE_NAME: "ingestor-server"

              # AIDP GUI replaces the bundled frontend (the subchart key is "frontend",
              # NOT "rag-frontend").
              frontend:
                enabled: false

              # nv-ingest subchart: keep MinIO + Redis + etcd (rag-server + ingestor
              # need rag-minio for multimodal blobs and rag-redis-master for summary
              # tracking). Only prevent the bundled Milvus from deploying.
              nv-ingest:
                redis:
                  metrics:
                    enabled: true
                    # Bitnami catalog change (Aug 2025): use bitnamilegacy mirror.
                    image:
                      registry: docker.io
                      repository: bitnamilegacy/redis-exporter
                    # Instructs redis-exporter to run LLEN/ZCARD on these keys each scrape
                    # so Prometheus receives redis_key_size for queue depth tracking.
                    # rq:queue:* — pending watcher jobs (list, key absent when empty → 0)
                    # rq:failed:* — failed jobs accumulating in a sorted set
                    extraArgs:
                      check-keys: "rq:queue:create_queue_default,rq:failed:create_queue_default"
                    serviceMonitor:
                      enabled: true
                      namespace: monitoring
                      labels:
                        release: kube-prometheus-stack
                  networkPolicy:
                    metrics:
                      ingressNSMatchLabels:
                        kubernetes.io/metadata.name: monitoring
                # D-03: nv-ingest uses gRPC-only OTLP. The Python OTEL SDK requires the
                # http:// scheme prefix for insecure gRPC — bare host:port defaults to TLS
                # and causes WRONG_VERSION_NUMBER SSL errors against the plain-gRPC collector.
                # Ref: OBSERVABILITY-PLAN §4.4. Targets Phase 37 customer-managed collector.
                # NOTE: MINIO_BUCKET, MINIO_INTERNAL_ADDRESS, MINIO_ACCESS_KEY, MINIO_SECRET_KEY,
                # and IMAGE_STORAGE_URI are set in nvidia-gpu-profile's nv-ingest section to
                # avoid merge collision (nvidia-gpu-profile is applied last and also has nv-ingest:).
                envVars:
                  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.${namespace}.svc.cluster.local:4317"
                  OTEL_SERVICE_NAME: "nv-ingest"
                  OTEL_TRACES_EXPORTER: "otlp"
                otelEnvVars:
                  OTEL_SERVICE_NAME: "nv-ingest"
                  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector.${namespace}.svc.cluster.local:4317"
                  OTEL_TRACES_EXPORTER: "otlp"
                  OTEL_METRICS_EXPORTER: "otlp"
                  OTEL_LOGS_EXPORTER: "none"
                  OTEL_PROPAGATORS: "tracecontext,baggage"
                  OTEL_PYTHON_EXCLUDED_URLS: "health"

                # Pre-created by aidp-bootstrap-secrets. nv-ingest hardcodes the secret
                # name "ngc-api" in templates/deployment.yaml and every nimOperator.*.authSecret
                # — no name override is honored, so the bootstrap Secret must be named "ngc-api".
                ngcApiSecret:
                  create: false
                ngcImagePullSecret:
                  create: false
                imagePullSecrets:
                  - name: "ngc-secret"

                milvusDeployed: false           # intended toggle: don't deploy internal Milvus
                milvus:
                  # Belt-and-braces — prevent any Milvus pod/Service templating in case
                  # milvusDeployed doesn't fully gate the subchart.
                  cluster:
                    enabled: false
                  standalone:
                    replicas: 0
                    resources:
                      limits:
                        nvidia.com/gpu: 0

                # D-02: nv-ingest sub-NIM OTEL env list overrides
                # CRITICAL Pitfall 1 — Helm replaces env: lists wholesale on override.
                # Each entry below MUST contain BOTH the upstream entries (verbatim from
                # appstack/nvidia-blueprint-rag/charts/nv-ingest/values.yaml) AND the
                # canonical OTEL block. Ref: OBSERVABILITY-PLAN §4.5; 38-RESEARCH.md Pattern 2
                nimOperator:
                  embedqa:
                    env:
                      # Upstream entries (nv-ingest/values.yaml:826-834) — preserved verbatim
                      - name: NIM_HTTP_API_PORT
                        value: "8000"
                      - name: NIM_TRITON_LOG_VERBOSE
                        value: "1"
                      - name: OMP_NUM_THREADS
                        value: "1"
                      - name: NIM_TRITON_PERFORMANCE_MODE
                        value: "throughput"
                      # Canonical OTEL block (D-02) — NIM_OTEL_SERVICE_NAME per-NIM
                      - name: NIM_ENABLE_OTEL
                        value: "true"
                      - name: NIM_OTEL_SERVICE_NAME
                        value: "embedqa"
                      - name: NIM_OTEL_TRACES_EXPORTER
                        value: "otlp"
                      - name: NIM_OTEL_METRICS_EXPORTER
                        value: "otlp"
                      - name: NIM_OTEL_EXPORTER_OTLP_ENDPOINT
                        value: "http://otel-collector.${namespace}.svc.cluster.local:4318"
                      - name: TRITON_OTEL_URL
                        value: "http://otel-collector.${namespace}.svc.cluster.local:4318/v1/traces"
                      - name: TRITON_OTEL_RATE
                        value: "1"

                  graphic_elements:
                    env:
                      # Upstream entries (nv-ingest/values.yaml:734-746) — preserved verbatim
                      - name: NIM_HTTP_API_PORT
                        value: "8000"
                      - name: NIM_TRITON_LOG_VERBOSE
                        value: "1"
                      - name: NIM_TRITON_RATE_LIMIT
                        value: "8"
                      - name: NIM_TRITON_MAX_BATCH_SIZE
                        value: "32"
                      - name: NIM_TRITON_CUDA_MEMORY_POOL_MB
                        value: "2048"
                      - name: NIM_TRITON_PERFORMANCE_MODE
                        value: "throughput"
                      - name: NIM_TRITON_MAX_QUEUE_DELAY_MICROSECONDS
                        value: "5000"
                      - name: OMP_NUM_THREADS
                        value: "1"
                      # Canonical OTEL block (D-02)
                      - name: NIM_ENABLE_OTEL
                        value: "true"
                      - name: NIM_OTEL_SERVICE_NAME
                        value: "graphic-elements"
                      - name: NIM_OTEL_TRACES_EXPORTER
                        value: "otlp"
                      - name: NIM_OTEL_METRICS_EXPORTER
                        value: "otlp"
                      - name: NIM_OTEL_EXPORTER_OTLP_ENDPOINT
                        value: "http://otel-collector.${namespace}.svc.cluster.local:4318"
                      - name: TRITON_OTEL_URL
                        value: "http://otel-collector.${namespace}.svc.cluster.local:4318/v1/traces"
                      - name: TRITON_OTEL_RATE
                        value: "1"

                  nemoretriever_ocr_v1:
                    env:
                      # Upstream entries (nv-ingest/values.yaml:868-882) — preserved verbatim
                      - name: OMP_NUM_THREADS
                        value: "8"
                      - name: NIM_HTTP_API_PORT
                        value: "8000"
                      - name: NIM_TRITON_LOG_VERBOSE
                        value: "1"
                      - name: NIM_TRITON_RATE_LIMIT
                        value: "8"
                      - name: NIM_TRITON_CUDA_MEMORY_POOL_MB
                        value: "8192"
                      - name: NIM_TRITON_MAX_BATCH_SIZE
                        value: "32"
                      - name: NIM_TRITON_ENABLE_MODEL_CONTROL
                        value: "1"
                      - name: NIM_TRITON_PERFORMANCE_MODE
                        value: "throughput"
                      - name: NIM_TRITON_MAX_QUEUE_DELAY_MICROSECONDS
                        value: "5000"
                      # Canonical OTEL block (D-02)
                      - name: NIM_ENABLE_OTEL
                        value: "true"
                      - name: NIM_OTEL_SERVICE_NAME
                        value: "nemoretriever-ocr-v1"
                      - name: NIM_OTEL_TRACES_EXPORTER
                        value: "otlp"
                      - name: NIM_OTEL_METRICS_EXPORTER
                        value: "otlp"
                      - name: NIM_OTEL_EXPORTER_OTLP_ENDPOINT
                        value: "http://otel-collector.${namespace}.svc.cluster.local:4318"
                      - name: TRITON_OTEL_URL
                        value: "http://otel-collector.${namespace}.svc.cluster.local:4318/v1/traces"
                      - name: TRITON_OTEL_RATE
                        value: "1"

                  page_elements:
                    # Phase 38: replaces upstream NIM_OTEL_METRICS_EXPORTER=console (broken)
                    # with otlp; retargets bundled otel-collector hostname →
                    # otel-collector.${namespace}.svc.cluster.local (T-NIM-METRICS-CONSOLE-FIX)
                    env:
                      # Upstream non-OTEL entries (nv-ingest/values.yaml:667-685) — preserved.
                      # Note: upstream has a duplicate NIM_TRITON_CPU_THREADS_PRE_PROCESSOR entry;
                      # listed once here with value "2" to avoid duplicate env var in the pod.
                      - name: NIM_HTTP_API_PORT
                        value: "8000"
                      - name: NIM_TRITON_LOG_VERBOSE
                        value: "1"
                      - name: NIM_TRITON_RATE_LIMIT
                        value: "8"
                      - name: NIM_TRITON_MAX_BATCH_SIZE
                        value: "32"
                      - name: NIM_TRITON_CUDA_MEMORY_POOL_MB
                        value: "2048"
                      - name: NIM_TRITON_CPU_THREADS_PRE_PROCESSOR
                        value: "2"
                      - name: OMP_NUM_THREADS
                        value: "2"
                      - name: NIM_TRITON_CPU_THREADS_POST_PROCESSOR
                        value: "1"
                      - name: NIM_TRITON_PERFORMANCE_MODE
                        value: "throughput"
                      - name: NIM_TRITON_MAX_QUEUE_DELAY_MICROSECONDS
                        value: "1000"
                      # Canonical OTEL block (D-02) — fixes upstream console→otlp and
                      # retargets bundled otel-collector → otel-collector.${namespace}.svc.cluster.local
                      - name: NIM_ENABLE_OTEL
                        value: "true"
                      - name: NIM_OTEL_SERVICE_NAME
                        value: "page-elements"
                      - name: NIM_OTEL_TRACES_EXPORTER
                        value: "otlp"
                      - name: NIM_OTEL_METRICS_EXPORTER
                        value: "otlp"
                      - name: NIM_OTEL_EXPORTER_OTLP_ENDPOINT
                        value: "http://otel-collector.${namespace}.svc.cluster.local:4318"
                      - name: TRITON_OTEL_URL
                        value: "http://otel-collector.${namespace}.svc.cluster.local:4318/v1/traces"
                      - name: TRITON_OTEL_RATE
                        value: "1"

                  table_structure:
                    env:
                      # Upstream entries (nv-ingest/values.yaml:780-792) — preserved verbatim
                      - name: NIM_HTTP_API_PORT
                        value: "8000"
                      - name: NIM_TRITON_LOG_VERBOSE
                        value: "1"
                      - name: NIM_TRITON_RATE_LIMIT
                        value: "8"
                      - name: NIM_TRITON_MAX_BATCH_SIZE
                        value: "32"
                      - name: NIM_TRITON_CUDA_MEMORY_POOL_MB
                        value: "3072"
                      - name: NIM_TRITON_PERFORMANCE_MODE
                        value: "throughput"
                      - name: NIM_TRITON_MAX_QUEUE_DELAY_MICROSECONDS
                        value: "5000"
                      - name: OMP_NUM_THREADS
                        value: "8"
                      # Canonical OTEL block (D-02)
                      - name: NIM_ENABLE_OTEL
                        value: "true"
                      - name: NIM_OTEL_SERVICE_NAME
                        value: "table-structure"
                      - name: NIM_OTEL_TRACES_EXPORTER
                        value: "otlp"
                      - name: NIM_OTEL_METRICS_EXPORTER
                        value: "otlp"
                      - name: NIM_OTEL_EXPORTER_OTLP_ENDPOINT
                        value: "http://otel-collector.${namespace}.svc.cluster.local:4318"
                      - name: TRITON_OTEL_URL
                        value: "http://otel-collector.${namespace}.svc.cluster.local:4318/v1/traces"
                      - name: TRITON_OTEL_RATE
                        value: "1"

                # Phase 43 (D-08/D-09): soft podAffinity to co-locate rag-nv-ingest with the
                # 4 extraction NIM pods. The nv-ingest deployment.yaml (lines 162-169 of
                # the vendored subchart) renders .Values.affinity natively, so this works
                # without a hook Job. Pod label `app: <NIMService.Name>` is set by the NIM
                # Operator's GetStandardSelectorLabels() — verified in RESEARCH.md §1.
                # topologyKey: kubernetes.io/hostname (Pitfall 6 — never topology.kubernetes.io/zone)
                # Source: PRD §7.6 verbatim.
                affinity:
                  podAffinity:
                    preferredDuringSchedulingIgnoredDuringExecution:
                      - weight: 100
                        podAffinityTerm:
                          topologyKey: kubernetes.io/hostname
                          labelSelector:
                            matchExpressions:
                              - key: app
                                operator: In
                                values:
                                  - nemoretriever-page-elements-v3
                                  - nemoretriever-graphic-elements-v1
                                  - nemoretriever-ocr-v1
                                  - nemoretriever-table-structure-v1

              # ------------------------------------------------------------------
              # D-05: NVIDIA bundled observability subchart lock
              # All four subcharts default to false upstream (values.yaml lines 487/523/
              # 611/618). This override is an INTENT LOCK — prevents accidental re-enable
              # if a future NVIDIA chart bump flips a default. Ref: OBSERVABILITY-PLAN §4.1
              # ------------------------------------------------------------------
              eck-elasticsearch:
                enabled: false
              kube-prometheus-stack:
                enabled: false
              opentelemetry-collector:
                enabled: false
              zipkin:
                enabled: false

              # ------------------------------------------------------------------
              # D-02: Top-level NIM OTEL env list overrides (nim-llm, nim-vlm,
              # nvidia-nim-llama-32-nv-embedqa-1b-v2, nvidia-nim-llama-32-nv-rerankqa-1b-v2)
              # CRITICAL Pitfall 1 — Helm replaces env: lists wholesale on override.
              # Each entry below MUST contain BOTH the upstream entries (verbatim from
              # appstack/nvidia-blueprint-rag/values.yaml) AND the canonical OTEL block.
              # Ref: OBSERVABILITY-PLAN §4.5; 38-RESEARCH.md Pattern 1
              # ------------------------------------------------------------------
              nimOperator:
                nim-llm:
                  # CR-01 fix (2026-05-13): the gpu-profile data key is a SECOND valuesFile (per
                  # weka-aidp-appstack.yaml line 1339) and Helm replaces `env:` lists wholesale.
                  # The gpu-profile previously had its own 3-entry nim-llm.env that stomped this
                  # 11-entry OTEL-bearing list. Resolution: consolidate ALL nim-llm env entries
                  # in this single source of truth (nvidia-rag-values). The gpu-profile no longer
                  # defines nim-llm.env; only image/model/resources/storage stay GPU-specific.
                  # NIM_MAX_MODEL_LEN value is the GPU-profile-tuned 32768 (RTX PRO 6000 SE),
                  # NOT the upstream 131072 default.
                  env:
                    # Upstream entries (values.yaml:715-723) — preserved verbatim per Pitfall 1
                    - name: NIM_HTTP_API_PORT
                      value: "8000"
                    - name: NIM_TRITON_LOG_VERBOSE
                      value: "1"
                    - name: NIM_SERVED_MODEL_NAME
                      value: "nvidia/llama-3.3-nemotron-super-49b-v1.5"
                    - name: NIM_MAX_MODEL_LEN
                      value: "32768"                  # GPU-profile value (RTX PRO 6000 SE); was 131072 upstream default
                    # GPU-profile-specific entries — consolidated here per CR-01 fix
                    - name: NCCL_P2P_DISABLE
                      value: "1"                       # RTX PRO 6000 is PCIe, no NVLink
                    - name: KV_CACHE_FREE_GPU_MEM_FRACTION
                      value: "0.9"
                    # Canonical OTEL block (D-02) — appended; NIM_OTEL_SERVICE_NAME per-NIM
                    - name: NIM_ENABLE_OTEL
                      value: "true"
                    - name: NIM_OTEL_SERVICE_NAME
                      value: "nim-llm"
                    - name: NIM_OTEL_TRACES_EXPORTER
                      value: "otlp"
                    - name: NIM_OTEL_METRICS_EXPORTER
                      value: "otlp"
                    - name: NIM_OTEL_EXPORTER_OTLP_ENDPOINT
                      value: "http://otel-collector.${namespace}.svc.cluster.local:4318"
                    - name: TRITON_OTEL_URL
