                "users": []
              }

      # =====================================================================
      # Component 0.5: Bootstrap Storage
      # Creates a static PV bound to the pre-existing WEKA "vectordb"
      # filesystem, and a tightly-bound PVC that Milvus will mount as its
      # segment/binlog storage (/var/lib/milvus/data). The claimRef +
      # volumeName pairing ensures no other PVC can accidentally claim
      # this PV.
      # =====================================================================
      - name: aidp-bootstrap-storage
        enabled: false
        dependsOn: [aidp-bootstrap-secrets]
        description: "Disabled — superseded by S3 mode (was: Static PV + PVC for Milvus POSIX mode, bound to WEKA vectordb filesystem)"
        kubernetesManifest: |
          # PersistentVolume — static binding to the existing WEKA filesystem "vectordb"
          apiVersion: v1
          kind: PersistentVolume
          metadata:
            name: milvus-vectordb-pv
          spec:
            capacity:
              storage: 10Ti              # informational for static FS-backed volumes
            accessModes:
              - ReadWriteMany
            persistentVolumeReclaimPolicy: Retain
            storageClassName: storageclass-wekafs-fs-static
            csi:
              driver: csi.weka.io
              volumeHandle: weka/v2/vectordb   # format: weka/v2/<existing_fs_name>
              volumeAttributes:
                filesystem: vectordb
            # Pre-bind to the PVC below — prevents any other PVC from claiming.
            claimRef:
              namespace: ${namespace}
              name: milvus-vectordb-pvc
          ---
          # PersistentVolumeClaim — consumed by the Milvus standalone pod
          # via persistence.persistentVolumeClaim.existingClaim in the chart values.
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: milvus-vectordb-pvc
            namespace: ${namespace}
          spec:
            accessModes:
              - ReadWriteMany
            resources:
              requests:
                storage: 10Ti
            storageClassName: storageclass-wekafs-fs-static
            volumeName: milvus-vectordb-pv

      # =====================================================================
      # Component 0.75: Envoy Endpoint Discovery
      # The Envoy Gateway is installed cluster-wide BEFORE the AIDP AppStack
      # (via the WEKA App Store cluster-init step), so its Service ClusterIP
      # exists by the time this Job runs. The Job:
      #   1. Looks up the Envoy Gateway Service ClusterIP
      #   2. Writes a small ConfigMap (envoy-endpoints) containing only the
      #      discovered IP under `global.keycloakHostAlias.ip`
      #   3. The aidp component's valuesFiles list references both
      #      aidp-site-config (user-edited; hostname only) AND envoy-endpoints
      #      (auto-populated; ip only). The operator deep-merges them at
      #      install time, so customers no longer need to know the IP up front.
      #
      # NOTE on future operator ${variables} support: the bash script below
      # uses ${ENVOY_IP} for shell interpolation. Once the WekaAppStore
      # operator's variable-substitution feature ships per
      # PRD-appstack-variable-substitution.md, these patterns will collide
      # with operator-side substitution — same caveat as keycloak-secret-sync.
      # When that ships, this entire component is superseded by the v2
      # "dynamic variable sources" backlog item (.planning/BACKLOG.md).
      # =====================================================================
      - name: envoy-endpoint-discovery
        enabled: true
        dependsOn: [aidp-bootstrap-secrets]
        description: "Discover Envoy Gateway ClusterIP and write envoy-endpoints ConfigMap"
        kubernetesManifest: |
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: envoy-endpoint-discovery
            namespace: ${namespace}
          ---
          # ClusterRole — read-only, services only, scoped to no specific
          # namespace because we read from envoy-gateway-system.
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRole
          metadata:
            name: envoy-endpoint-discovery
          rules:
            - apiGroups: [""]
              resources: ["services"]
              verbs: ["get", "list"]
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: envoy-endpoint-discovery
          subjects:
            - kind: ServiceAccount
              name: envoy-endpoint-discovery
              namespace: ${namespace}
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: envoy-endpoint-discovery
          ---
          # Role — write the small overlay ConfigMap in the rag namespace.
          # Split into two rules because Kubernetes RBAC's resourceNames
          # filter only applies to verbs that operate on an existing named
          # resource (get/update/patch/delete). For "create" the name lives
          # in the request body and isn't known at admission time, so
          # resourceNames silently denies all creates. The script only ever
          # creates "envoy-endpoints" so the practical scope is the same.
          apiVersion: rbac.authorization.k8s.io/v1
          kind: Role
          metadata:
            name: envoy-endpoint-discovery
            namespace: ${namespace}
          rules:
            - apiGroups: [""]
              resources: ["configmaps"]
              verbs: ["create"]
            - apiGroups: [""]
              resources: ["configmaps"]
              resourceNames: ["envoy-endpoints"]
              verbs: ["get", "update", "patch"]
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata:
            name: envoy-endpoint-discovery
            namespace: ${namespace}
          subjects:
            - kind: ServiceAccount
              name: envoy-endpoint-discovery
              namespace: ${namespace}
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: Role
            name: envoy-endpoint-discovery
          ---
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: envoy-endpoint-discovery
            namespace: ${namespace}
          spec:
            backoffLimit: 6
            ttlSecondsAfterFinished: 60
            template:
              spec:
                restartPolicy: OnFailure
                serviceAccountName: envoy-endpoint-discovery
                containers:
                  - name: discover
                    image: alpine/k8s:1.30.0
                    command:
                      - /bin/bash
                      - -c
                      - |
                        {%- raw %}
                        set -euo pipefail
                        echo "Discovering Envoy Gateway ClusterIP..."

                        ENVOY_IP=""
                        for i in $(seq 1 30); do
                          ENVOY_IP=$(kubectl -n envoy-gateway-system get svc \
                            -l 'gateway.envoyproxy.io/owning-gateway-name=warp-edge-gateway' \
                            -o jsonpath='{.items[0].spec.clusterIP}' 2>/dev/null || true)
                          [[ -n "${ENVOY_IP}" ]] && break
                          echo "  waiting for Envoy Gateway... (${i}/30)"
                          sleep 5
                        done

                        if [[ -z "${ENVOY_IP}" ]]; then
                          echo "ERROR: Envoy Gateway service not found in envoy-gateway-system." >&2
                          echo "Hint: ensure the WEKA App Store cluster-init has installed the Gateway before AIDP." >&2
                          exit 1
                        fi
                        echo "Discovered Envoy Gateway ClusterIP: ${ENVOY_IP}"

                        cat <<EOF | kubectl apply -f -
                        apiVersion: v1
                        kind: ConfigMap
                        metadata:
                          name: envoy-endpoints
                          namespace: ${namespace}
                          labels:
                            app.kubernetes.io/managed-by: aidp-bootstrap
                            app.kubernetes.io/component: envoy-endpoint-discovery
                        data:
                          aidp-values: |
                            global:
                              keycloakHostAlias:
                                enabled: true
                                ip: "${ENVOY_IP}"
                        EOF

                        echo "Wrote envoy-endpoints ConfigMap (ip=${ENVOY_IP})."
                        {% endraw %}
        readinessCheck:
          type: job
          name: envoy-endpoint-discovery
          timeout: 180

      # =====================================================================
      # Component 1: Keycloak Identity Provider
      # =====================================================================
      - name: keycloak
        enabled: true
        dependsOn: [aidp-bootstrap-secrets, aidp-keycloak-realm-config, aidp-site-config]
        description: "Keycloak OIDC identity provider with AIDP realm configuration"
        helmChart:
          repository: https://codecentric.github.io/helm-charts
          name: keycloakx
          version: "7.1.9"
          releaseName: keycloak
          crdsStrategy: Skip
        values:
          # Pin Service/StatefulSet name to "keycloak". Without this the
          # codecentric/keycloakx chart names them "<release>-<chart>" =
          # "keycloak-keycloakx", which the AIDP HTTPRoute backendRef
          # (helm/aidp/templates/envoy/httproute-keycloak.yaml) and the
          # post-install secret-sync Job expect to be exactly "keycloak".
          # Same pattern used for space-manager-postgres further down.
          fullnameOverride: keycloak
          command:
            - "/opt/keycloak/bin/kc.sh"
            - "start"
            - "--http-port=8080"
            - "--hostname-strict=false"
            - "--http-relative-path=/auth/"
            - "--proxy-headers=xforwarded"   # Keycloak 25+ replaced --proxy=edge
            - "--import-realm"               # import realm JSON from /opt/keycloak/data/import on start
            - "--health-enabled=true"                 # expose management interface on port 9000
            - "--metrics-enabled=true"                # expose /metrics on management interface
            - "--http-management-relative-path=/auth" # match chart probes that target /auth/health on port 9000


          extraEnv: |
            - name: KEYCLOAK_ADMIN
              value: admin
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin-secret
                  key: admin-password
            - name: JAVA_OPTS_APPEND
              value: >-
                -Djgroups.dns.query={{ include "keycloak.fullname" . }}-headless

          # The realm-config ConfigMap is mounted directly into the main
          # container (see extraVolumeMounts below). No init container cp
          # step is needed — Keycloak reads JSON files from the mount path.

          extraVolumes: |
            - name: realm-config
              configMap:
                name: keycloak-realm-config

          extraVolumeMounts: |
            - name: realm-config
              mountPath: /opt/keycloak/data/import
              readOnly: true

          service:
            type: ClusterIP
            httpPort: 80
            httpsPort: 443

          postgresql:
            enabled: true
            auth:
              existingSecret: keycloak-postgres-secret
              secretKeys:
                adminPasswordKey: postgres-password
                userPasswordKey: password
            # Bitnami catalog change (Aug 2025): use bitnamilegacy mirror.
            image:
              registry: docker.io
              repository: bitnamilegacy/postgresql
            volumePermissions:
              image:
                registry: docker.io
                repository: bitnamilegacy/os-shell
            metrics:
              image:
                registry: docker.io
                repository: bitnamilegacy/postgres-exporter

        valuesFiles:
          - kind: ConfigMap
            name: aidp-site-config
            key: keycloak-values

        readinessCheck:
          # Operator's statefulset wait relies on .status.conditions[type=Ready]
          # which StatefulSets don't populate. Use pod-level Ready instead.
          type: pod
          selector: "app.kubernetes.io/instance=keycloak,app.kubernetes.io/name=keycloakx"
          # Cold start (postgres init + realm import + Quarkus boot) can take
          # 4–6 minutes. 600s gives comfortable headroom.
          timeout: 600

      # =====================================================================
      # Component 1.5: Keycloak Secret Sync
      # Keycloak 25+ silently discards client secrets during realm import
      # (keycloak/keycloak#30543). Confidential clients (aidp-gui, rag-bridge)
      # are auto-generated by Keycloak instead. This Job authenticates as
      # admin, FETCHES the generated client secrets via the Admin API, and
      # PATCHES the downstream K8s Secrets (aidp-gui-secrets, rag-bridge-
      # secrets) so the AIDP component starts with real values via envFrom.
      # Idempotent: re-runs are no-ops when secrets are already in sync.
      # Sequenced BEFORE aidp so its pods boot the first time with real
      # secrets — no rollout restart required.
      #
      # NOTE on future operator ${variables} support: the bash script below
      # uses ${NS}, ${KC_HOST}, etc. for shell interpolation. Once the
      # WekaAppStore operator's variable-substitution feature ships per
      # PRD-appstack-variable-substitution.md, these patterns will collide
      # with operator-side substitution. Either (a) update the PRD to use
      # safe_substitute() so unknown names pass through, or (b) escape the
      # bash references here as $$NS, $$KC_HOST etc. at the same time the
      # operator change lands.
      # =====================================================================
      - name: keycloak-secret-sync
        enabled: true
        dependsOn: [keycloak]
        description: "Fetch Keycloak-generated client secrets and patch downstream K8s Secrets"
        kubernetesManifest: |
          # ServiceAccount + Role scoped to ONLY the two Secrets that consume
          # Keycloak client credentials. Cannot read any other Secret.
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: keycloak-secret-sync
            namespace: ${namespace}
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: Role
          metadata:
            name: keycloak-secret-sync
            namespace: ${namespace}
          rules:
            - apiGroups: [""]
              resources: ["secrets"]
              resourceNames: ["aidp-gui-secrets", "rag-bridge-secrets"]
              verbs: ["get", "patch"]
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata:
            name: keycloak-secret-sync
            namespace: ${namespace}
          subjects:
            - kind: ServiceAccount
              name: keycloak-secret-sync
              namespace: ${namespace}
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: Role
            name: keycloak-secret-sync
          ---
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: keycloak-secret-sync
            namespace: ${namespace}
          spec:
            backoffLimit: 6
            ttlSecondsAfterFinished: 60     # auto-clean after success so reapply can recreate
            template:
              spec:
                restartPolicy: OnFailure
                serviceAccountName: keycloak-secret-sync
                containers:
                  - name: sync
                    image: alpine/k8s:1.30.0
                    env:
                      - name: NS
                        valueFrom:
                          fieldRef:
                            fieldPath: metadata.namespace
                      - name: KC_ADMIN_PASSWORD
                        valueFrom:
                          secretKeyRef:
                            name: keycloak-admin-secret
                            key: admin-password
                      # Site-config aidp-values blob — Job uses yq to extract
                      # gui.baseUrl for the aidp-gui client URL config.
                      - name: AIDP_VALUES
                        valueFrom:
                          configMapKeyRef:
                            name: aidp-site-config
                            key: aidp-values
                    command:
                      - /bin/bash
                      - -c
                      - |
                        {%- raw %}
                        set -euo pipefail
                        # codecentric/keycloakx names the main Service "<fullname>-http"
                        # (see chart's templates/service.yaml). With fullnameOverride: keycloak
                        # the resulting Service is "keycloak-http", not "keycloak".
                        KC_HOST="http://keycloak-http.${NS}.svc.cluster.local"
                        REALM="rag-gateway"

                        echo "Waiting for Keycloak master realm at ${KC_HOST}..."
                        until curl -sf -H "X-Forwarded-Proto: https" "${KC_HOST}/auth/realms/master" >/dev/null; do
                          sleep 5
                        done

                        echo "Authenticating as admin..."
                        ADMIN_TOKEN=$(curl -sf -H "X-Forwarded-Proto: https" -X POST \
                          "${KC_HOST}/auth/realms/master/protocol/openid-connect/token" \
                          -d "client_id=admin-cli" \
                          -d "username=admin" \
                          -d "password=${KC_ADMIN_PASSWORD}" \
                          -d "grant_type=password" | jq -r '.access_token')

                        if [[ -z "${ADMIN_TOKEN}" || "${ADMIN_TOKEN}" == "null" ]]; then
                          echo "ERROR: failed to obtain admin token" >&2
                          exit 1
                        fi

                        # Ensure rag-gateway realm has sslRequired=NONE.
                        # Why: in-cluster pods (aidp-gui, rag-bridge) fetch the
                        # realm's .well-known/openid-configuration over plain
                        # HTTP. Keycloak's default sslRequired=external rejects
                        # non-localhost HTTP with 403. Until real TLS is in
                        # place between pods and Envoy → Keycloak, the realm
                        # has to allow plain HTTP. When TLS lands cluster-wide,
                        # REMOVE this block AND change the realm JSON back to
                        # "sslRequired": "external".
                        # Idempotent: no-op if already NONE.
                        echo "Ensuring rag-gateway realm sslRequired=NONE..."
                        CURRENT_SSL=$(curl -sf -H "X-Forwarded-Proto: https" \
                          -H "Authorization: Bearer ${ADMIN_TOKEN}" \
                          "${KC_HOST}/auth/admin/realms/${REALM}" \
                          | jq -r '.sslRequired // empty')
                        case "${CURRENT_SSL}" in
                          NONE|none)
                            echo "  already NONE, skipping"
                            ;;
                          *)
                            curl -sf -H "X-Forwarded-Proto: https" \
                              -X PUT \
                              -H "Authorization: Bearer ${ADMIN_TOKEN}" \
                              -H "Content-Type: application/json" \
                              -d '{"sslRequired":"NONE"}' \
                              "${KC_HOST}/auth/admin/realms/${REALM}"
                            echo "  patched (was: ${CURRENT_SSL})"
                            ;;
                        esac

                        sync_client() {
                          local CLIENT_ID="$1"
                          local TARGET_SECRET="$2"
                          local SECRET_KEY="$3"

                          echo "Syncing ${CLIENT_ID} -> secret/${TARGET_SECRET}.${SECRET_KEY}"

                          local CLIENT_UUID
                          CLIENT_UUID=$(curl -sf -H "X-Forwarded-Proto: https" \
                            -H "Authorization: Bearer ${ADMIN_TOKEN}" \
                            "${KC_HOST}/auth/admin/realms/${REALM}/clients" \
                            | jq -r ".[] | select(.clientId==\"${CLIENT_ID}\") | .id")

                          if [[ -z "${CLIENT_UUID}" || "${CLIENT_UUID}" == "null" ]]; then
                            echo "ERROR: client ${CLIENT_ID} not found in realm ${REALM}" >&2
                            exit 1
                          fi

                          local CLIENT_SECRET
                          CLIENT_SECRET=$(curl -sf -H "X-Forwarded-Proto: https" \
                            -H "Authorization: Bearer ${ADMIN_TOKEN}" \
                            "${KC_HOST}/auth/admin/realms/${REALM}/clients/${CLIENT_UUID}/client-secret" \
                            | jq -r '.value')

                          if [[ -z "${CLIENT_SECRET}" || "${CLIENT_SECRET}" == "null" ]]; then
                            echo "ERROR: ${CLIENT_ID} returned no client-secret (is it a confidential client?)" >&2
                            exit 1
                          fi

                          local CURRENT
                          CURRENT=$(kubectl -n "${NS}" get secret "${TARGET_SECRET}" \
                            -o jsonpath="{.data.${SECRET_KEY}}" | base64 -d 2>/dev/null || echo "")

                          if [[ "${CURRENT}" == "${CLIENT_SECRET}" ]]; then
                            echo "  already in sync, skipping"
                            return 0
                          fi

                          local ENCODED
                          ENCODED=$(printf '%s' "${CLIENT_SECRET}" | base64 | tr -d '\n')
                          kubectl -n "${NS}" patch secret "${TARGET_SECRET}" \
                            --type='json' \
                            -p="[{\"op\":\"replace\",\"path\":\"/data/${SECRET_KEY}\",\"value\":\"${ENCODED}\"}]"
                          echo "  patched"
                        }

                        # Grant a confidential client's service account one or more
                        # realm-management client roles. rag-bridge needs view-users +
                        # query-users so its client-credentials token can call the admin
                        # users endpoint (uid/gids lookup). Idempotent — skips roles
                        # already assigned. Same in-cluster admin pattern as sync_client.
                        grant_sa_realm_mgmt_roles() {
                          local CLIENT_ID="$1"; shift
                          local ROLES="$*"
                          echo "Granting realm-management roles to ${CLIENT_ID} service account: ${ROLES}"

                          local CLIENT_UUID
                          CLIENT_UUID=$(curl -sf -H "X-Forwarded-Proto: https" \
                            -H "Authorization: Bearer ${ADMIN_TOKEN}" \
                            "${KC_HOST}/auth/admin/realms/${REALM}/clients" \
                            | jq -r ".[] | select(.clientId==\"${CLIENT_ID}\") | .id")
                          if [[ -z "${CLIENT_UUID}" || "${CLIENT_UUID}" == "null" ]]; then
                            echo "ERROR: client ${CLIENT_ID} not found in realm ${REALM}" >&2; exit 1
                          fi

                          local SA_ID
                          SA_ID=$(curl -sf -H "X-Forwarded-Proto: https" \
                            -H "Authorization: Bearer ${ADMIN_TOKEN}" \
                            "${KC_HOST}/auth/admin/realms/${REALM}/clients/${CLIENT_UUID}/service-account-user" \
                            | jq -r '.id')
                          if [[ -z "${SA_ID}" || "${SA_ID}" == "null" ]]; then
                            echo "ERROR: ${CLIENT_ID} has no service account (serviceAccountsEnabled?)" >&2; exit 1
                          fi

                          local RM_UUID
                          RM_UUID=$(curl -sf -H "X-Forwarded-Proto: https" \
                            -H "Authorization: Bearer ${ADMIN_TOKEN}" \
                            "${KC_HOST}/auth/admin/realms/${REALM}/clients?clientId=realm-management" \
                            | jq -r '.[0].id')

                          local CURRENT
                          CURRENT=$(curl -sf -H "X-Forwarded-Proto: https" \
                            -H "Authorization: Bearer ${ADMIN_TOKEN}" \
                            "${KC_HOST}/auth/admin/realms/${REALM}/users/${SA_ID}/role-mappings/clients/${RM_UUID}" \
                            | jq -r '.[].name')

                          local TO_ADD="[]"
                          for ROLE in ${ROLES}; do
                            if echo "${CURRENT}" | grep -qx "${ROLE}"; then
                              echo "  ${ROLE}: already granted"; continue
                            fi
                            local ROLE_OBJ
                            ROLE_OBJ=$(curl -sf -H "X-Forwarded-Proto: https" \
                              -H "Authorization: Bearer ${ADMIN_TOKEN}" \
                              "${KC_HOST}/auth/admin/realms/${REALM}/clients/${RM_UUID}/roles/${ROLE}")
                            TO_ADD=$(echo "${TO_ADD}" | jq ". + [${ROLE_OBJ}]")
                          done

                          if [[ "$(echo "${TO_ADD}" | jq 'length')" == "0" ]]; then
                            echo "  nothing to add"; return 0
                          fi
                          curl -sf -H "X-Forwarded-Proto: https" -X POST \
                            -H "Authorization: Bearer ${ADMIN_TOKEN}" \
                            -H "Content-Type: application/json" \
                            -d "${TO_ADD}" \
                            "${KC_HOST}/auth/admin/realms/${REALM}/users/${SA_ID}/role-mappings/clients/${RM_UUID}"
                          echo "  granted"
                        }

                        sync_client aidp-gui   aidp-gui-secrets   KEYCLOAK_CLIENT_SECRET
                        sync_client rag-bridge rag-bridge-secrets KEYCLOAK_CLIENT_SECRET

                        # rag-bridge's SA must read users for the uid/gids admin lookup.
                        grant_sa_realm_mgmt_roles rag-bridge view-users query-users

                        # Declare uid + gids as managed user-profile attributes so every user
                        # (new + existing) carries the fields rag-bridge reads (KC_UID_ATTR /
                        # KC_GIDS_ATTR). edit=admin so only admins set them; OPTIONAL (not
                        # required) so OIDC/OAuth signup isn't blocked. Idempotent.
                        # NOTE: declaring the FIELDS does not auto-populate VALUES — set them
                        # per user (Admin Console / API) or federate from LDAP. rag-gateway
                        # TOOL_FALLBACK_UID/GIDS covers any user left unset.
                        echo "Ensuring uid/gids declared in ${REALM} user profile..."
                        PROFILE=$(curl -sf -H "X-Forwarded-Proto: https" \
                          -H "Authorization: Bearer ${ADMIN_TOKEN}" \
                          "${KC_HOST}/auth/admin/realms/${REALM}/users/profile")
                        if echo "${PROFILE}" | jq -e '.attributes[] | select(.name=="uid")' >/dev/null 2>&1; then
                          echo "  already declared, skipping"
                        else
                          echo "${PROFILE}" | jq '.attributes += [
                            {"name":"uid","displayName":"POSIX UID","multivalued":false,
                             "permissions":{"view":["admin","user"],"edit":["admin"]},
                             "validations":{"pattern":{"pattern":"^[0-9]+$","error-message":"uid must be numeric"}}},
                            {"name":"gids","displayName":"POSIX GIDs","multivalued":true,
                             "permissions":{"view":["admin","user"],"edit":["admin"]},
                             "validations":{"pattern":{"pattern":"^[0-9]+$","error-message":"gid must be numeric"}}}
                          ]' \
                            | curl -sf -H "X-Forwarded-Proto: https" -X PUT \
                                -H "Authorization: Bearer ${ADMIN_TOKEN}" \
                                -H "Content-Type: application/json" \
                                -d @- \
                                "${KC_HOST}/auth/admin/realms/${REALM}/users/profile" >/dev/null
                          echo "  declared uid + gids in user profile"
                        fi

                        # ------------------------------------------------------------------
                        # Configure aidp-gui client redirectUris and webOrigins.
                        # Keycloak rejects any login whose redirect_uri doesn't appear in
                        # the client's registered redirectUris. The realm JSON ships the
                        # literal placeholders AIDP_REDIRECT_URI_PLACEHOLDER and
                        # AIDP_ORIGIN_PLACEHOLDER; this block PUTs the real values derived
                        # from gui.baseUrl in aidp-site-config. Idempotent — skips when
                        # already in sync.
                        # ------------------------------------------------------------------
                        configure_client_urls() {
                          local CLIENT_ID="$1"
                          local REDIRECT_URI="$2"
                          local WEB_ORIGIN="$3"

                          echo "Configuring ${CLIENT_ID} URLs (redirect=${REDIRECT_URI}, origin=${WEB_ORIGIN})..."

                          local CLIENT_UUID
                          CLIENT_UUID=$(curl -sf -H "X-Forwarded-Proto: https" \
                            -H "Authorization: Bearer ${ADMIN_TOKEN}" \
                            "${KC_HOST}/auth/admin/realms/${REALM}/clients" \
                            | jq -r ".[] | select(.clientId==\"${CLIENT_ID}\") | .id")

                          if [[ -z "${CLIENT_UUID}" || "${CLIENT_UUID}" == "null" ]]; then
                            echo "ERROR: client ${CLIENT_ID} not found in realm ${REALM}" >&2
                            exit 1
                          fi

                          local CURRENT_CLIENT
                          CURRENT_CLIENT=$(curl -sf -H "X-Forwarded-Proto: https" \
                            -H "Authorization: Bearer ${ADMIN_TOKEN}" \
                            "${KC_HOST}/auth/admin/realms/${REALM}/clients/${CLIENT_UUID}")

                          local DESIRED_REDIRECTS DESIRED_ORIGINS
                          DESIRED_REDIRECTS=$(jq -nc --arg r "${REDIRECT_URI}" '[$r]')
                          DESIRED_ORIGINS=$(jq -nc --arg o "${WEB_ORIGIN}" '[$o]')

                          local CURRENT_REDIRECTS CURRENT_ORIGINS
                          CURRENT_REDIRECTS=$(echo "${CURRENT_CLIENT}" | jq -c '.redirectUris // []')
                          CURRENT_ORIGINS=$(echo "${CURRENT_CLIENT}" | jq -c '.webOrigins // []')

                          if [[ "${CURRENT_REDIRECTS}" == "${DESIRED_REDIRECTS}" \
                              && "${CURRENT_ORIGINS}" == "${DESIRED_ORIGINS}" ]]; then
                            echo "  already in sync, skipping"
                            return 0
                          fi

                          local PATCHED
                          PATCHED=$(echo "${CURRENT_CLIENT}" | jq \
                            --argjson redirects "${DESIRED_REDIRECTS}" \
                            --argjson origins "${DESIRED_ORIGINS}" \
                            '.redirectUris = $redirects | .webOrigins = $origins')

                          curl -sf -H "X-Forwarded-Proto: https" \
                            -X PUT \
                            -H "Authorization: Bearer ${ADMIN_TOKEN}" \
                            -H "Content-Type: application/json" \
                            -d "${PATCHED}" \
                            "${KC_HOST}/auth/admin/realms/${REALM}/clients/${CLIENT_UUID}"
                          echo "  patched"
                        }

                        AIDP_BASE_URL=$(printf '%s' "${AIDP_VALUES}" | yq '.gui.baseUrl // ""')
                        if [[ -z "${AIDP_BASE_URL}" || "${AIDP_BASE_URL}" == "null" ]]; then
                          echo "ERROR: gui.baseUrl missing from aidp-site-config" >&2
                          exit 1
                        fi
                        AIDP_BASE_URL="${AIDP_BASE_URL%/}"      # strip trailing slash
                        configure_client_urls aidp-gui \
                          "${AIDP_BASE_URL}/oauth/oidc/callback" \
                          "${AIDP_BASE_URL}"

                        echo "Keycloak post-install config complete."
                        {% endraw %}
        readinessCheck:
          type: job
          name: keycloak-secret-sync
          timeout: 300

      # =====================================================================
      # Component 2: Clustered Milvus (external to NVIDIA RAG blueprint)
      # CPU-only, S3-backed via WEKA S3 (no MinIO pod, no Pulsar — bundled
      # Kafka MQ). Woodpecker disabled: WEKA S3 does not return the
      # ErrSegmentFenced error that Woodpecker's conditional-write probe
      # requires, causing the streaming node to panic on startup.
      # Release name "milvus" is intentional: it preserves the proxy
      # service DNS at milvus.${namespace}.svc.cluster.local:19530 so existing
      # consumers (rag-gateway, space-manager, ingestor, GUI) need no
      # config changes.
      # =====================================================================
      - name: milvus
        enabled: true
        dependsOn: [aidp-bootstrap-secrets, weka-s3-lb, aidp-site-config]
        description: "Milvus 2.6.3 cluster — vector DB for RAG (S3-backed via WEKA S3 aidp-bucket/milvus, Kafka MQ)"
        helmChart:
          repository: https://zilliztech.github.io/milvus-helm
          name: milvus
          version: "5.0.5"
          releaseName: milvus
          crdsStrategy: Skip
        valuesFiles:
          - kind: ConfigMap
            name: aidp-site-config
            key: milvus-values
        readinessCheck:
          # Cluster mode renders 6 milvus pods (proxy, mixcoord, datanode,
          # querynode, streamingnode, attu) all carrying the labels below.
          # The etcd pods carry app.kubernetes.io/name=etcd and are excluded
          # by the AND, so this selector waits for the full Milvus cluster
          # without blocking on etcd's separate readiness.
          type: pod
          selector: "app.kubernetes.io/instance=milvus,app.kubernetes.io/name=milvus"
          timeout: 900

      # =====================================================================
      # (NIM Operator moved to cluster_init/app-store-cluster-init.yaml —
      # it's a cluster-wide prerequisite, not an AIDP runtime component.)
      # =====================================================================

      # =====================================================================
      # Component 2.75: NIM Cache PVCs
      # Pre-creates the 7 PVCs each NIMCache CR expects, using the default
      # storage class (WEKA dir-api, dynamic). Decoupling the PVCs from the
      # blueprint's Helm release means the PVCs survive helm uninstall —
      # so long as the bootstrap component still owns them.
      #
      # NOTE ON PERSISTENCE ACROSS TEARDOWN CYCLES:
      # Because these PVCs live inside the weka-aidp AppStack, they ARE
      # deleted when you `kubectl delete wekaappstore weka-aidp`. To keep
      # cache data through repeated teardowns:
      #   1) After first provisioning, patch each PV to Retain:
      #      for p in $(kubectl -n ${namespace} get pvc \
      #        -l 'nim-cache=true' -o jsonpath='{.items[*].spec.volumeName}'); do
      #        kubectl patch pv $p --type=merge \
      #          -p '{"spec":{"persistentVolumeReclaimPolicy":"Retain"}}';
      #      done
      #   2) Between teardown and reinstall, clear claimRef on Released PVs:
      #      for p in $(kubectl get pv -o jsonpath='{.items[?(@.status.phase=="Released")].metadata.name}'); do
      #        kubectl patch pv $p --type=merge -p '{"spec":{"claimRef":null}}';
      #      done
      # Alternatively move this component's manifest out into a standalone
      # nim-cache-pvcs.yaml that you apply once and leave alone.
      # =====================================================================
      - name: aidp-bootstrap-nim-cache
        enabled: true
        dependsOn: [aidp-bootstrap-secrets, aidp-bootstrap-ngc-secrets]
        description: "Pre-created PVCs for NIM model caches (survive helm uninstall)"
        kubernetesManifest: |
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: nim-llm-cache-pvc
            namespace: ${namespace}
            labels:
              nim-cache: "true"
              nim: nim-llm
          spec:
            accessModes: [ReadWriteMany]
            storageClassName: storageclass-wekafs-dir-api-retain
            resources:
              requests:
                storage: 120Gi
          ---
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: nemotron-embedding-ms-cache-pvc
            namespace: ${namespace}
            labels:
              nim-cache: "true"
              nim: nemotron-embedding-ms
          spec:
            accessModes: [ReadWriteMany]
            storageClassName: storageclass-wekafs-dir-api-retain
            resources:
              requests:
                storage: 50Gi
          ---
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: nemotron-ranking-ms-cache-pvc
            namespace: ${namespace}
            labels:
              nim-cache: "true"
              nim: nemotron-ranking-ms
          spec:
            accessModes: [ReadWriteMany]
            storageClassName: storageclass-wekafs-dir-api-retain
            resources:
              requests:
                storage: 50Gi
          ---
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: nemoretriever-ocr-v1-pvc
            namespace: ${namespace}
            labels:
              nim-cache: "true"
              nim: nemoretriever-ocr-v1
          spec:
            accessModes: [ReadWriteMany]
            storageClassName: storageclass-wekafs-dir-api-retain
            resources:
              requests:
                storage: 25Gi
          ---
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: nemoretriever-page-elements-v3-pvc
            namespace: ${namespace}
            labels:
              nim-cache: "true"
              nim: nemoretriever-page-elements-v3
          spec:
            accessModes: [ReadWriteMany]
            storageClassName: storageclass-wekafs-dir-api-retain
            resources:
              requests:
                storage: 25Gi
          ---
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: nemoretriever-graphic-elements-v1-pvc
            namespace: ${namespace}
            labels:
              nim-cache: "true"
              nim: nemoretriever-graphic-elements-v1
          spec:
            accessModes: [ReadWriteMany]
            storageClassName: storageclass-wekafs-dir-api-retain
            resources:
              requests:
                storage: 25Gi
          ---
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: nemoretriever-table-structure-v1-pvc
            namespace: ${namespace}
            labels:
              nim-cache: "true"
              nim: nemoretriever-table-structure-v1
          spec:
            accessModes: [ReadWriteMany]
            storageClassName: storageclass-wekafs-dir-api-retain
            resources:
              requests:
                storage: 25Gi

      # =====================================================================
      # Component 2.9: AIDP Observability Stack
      # Installs BEFORE nvidia-rag-blueprint so the OTEL collector endpoint
      # at otel-collector.${namespace}.svc.cluster.local:4317 is ready when
      # the NVIDIA services boot (per D-02 — Phase 38 APP_TRACING_* /
      # NIM_OTEL_* envs must connect immediately, not after a cold-start
      # gap). Loki (200Gi) + Promtail + Tempo (100Gi) + OTEL Collector +
      # Phoenix (20Gi) — all backed by WEKA POSIX PVCs.
      # =====================================================================
      - name: aidp-observability
        enabled: true
        dependsOn: [aidp-bootstrap-nim-cache, aidp-site-config]
        description: "LGTM+Phoenix observability stack (Loki + Promtail + Tempo + OTEL Collector + Phoenix) — installed BEFORE nvidia-rag-blueprint so the OTEL endpoint exists at NVIDIA boot (per D-02)."
        helmChart:
          repository: "https://weka.github.io/aidp-helm"
          name: aidp-observability
          version: "0.1.16"
          releaseName: aidp-observability
          crdsStrategy: Skip
        valuesFiles:
          - kind: ConfigMap
            name: aidp-site-config
            key: aidp-observability-values
        readinessCheck:
          type: pod
          selector: "app.kubernetes.io/instance=aidp-observability"
          timeout: 900

      # =====================================================================
      # Component 2.10: Embedding Gateway
      # Envoy Gateway internal proxy that distributes embedding requests
      # across nemotron-embedding-ms pods at the HTTP layer. Must be
      # deployed BEFORE nvidia-rag-blueprint so embedding-proxy.rag DNS
      # resolves when nv-ingest reads EMBEDDING_NIM_ENDPOINT.
      #
      # Uses a Job (not bare kubernetesManifest) because the App Store
      # operator service account lacks RBAC for gateway.envoyproxy.io and
      # gateway.networking.k8s.io CRDs.
      #
      # Stable DNS approach: Envoy Gateway runs its data-plane pods in the
      # envoy-gateway-system namespace, so a selector-based Service in rag
      # can never match them. The Job instead creates an ExternalName
      # Service in rag that resolves to the auto-generated Envoy service in
      # envoy-gateway-system, discovered by owning-gateway labels.
      # =====================================================================
      - name: embedding-gateway
        enabled: true
        dependsOn: [aidp-bootstrap-secrets]
        description: "Envoy Gateway internal L7 proxy for embedding LB — stable embedding-proxy DNS for nv-ingest"
        kubernetesManifest: |
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: embedding-gateway-setup
            namespace: ${namespace}
          ---
          # Role: manage Envoy CRDs and Services in rag namespace
          apiVersion: rbac.authorization.k8s.io/v1
          kind: Role
          metadata:
            name: embedding-gateway-setup
            namespace: ${namespace}
          rules:
            - apiGroups: ["gateway.envoyproxy.io"]
              resources: ["envoyproxies"]
              verbs: ["get", "create", "update", "patch"]
            - apiGroups: ["gateway.networking.k8s.io"]
              resources: ["gateways", "httproutes"]
              verbs: ["get", "create", "update", "patch"]
            - apiGroups: [""]
              resources: ["services"]
              verbs: ["get", "list", "create", "update", "patch", "delete"]
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata:
            name: embedding-gateway-setup
            namespace: ${namespace}
          subjects:
            - kind: ServiceAccount
              name: embedding-gateway-setup
              namespace: ${namespace}
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: Role
            name: embedding-gateway-setup
          ---
          # ClusterRole: read Services in envoy-gateway-system to discover
          # the auto-generated Envoy service name (unpredictable hash suffix)
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRole
          metadata:
            name: embedding-gateway-setup-envoy-reader
          rules:
            - apiGroups: [""]
              resources: ["services"]
              verbs: ["get", "list"]
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: embedding-gateway-setup-envoy-reader
          subjects:
            - kind: ServiceAccount
              name: embedding-gateway-setup
              namespace: ${namespace}
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: embedding-gateway-setup-envoy-reader
          ---
          # ClusterRole: get/update Gateway status to poll programmed condition
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRole
          metadata:
            name: embedding-gateway-setup-gateway-reader
          rules:
            - apiGroups: ["gateway.networking.k8s.io"]
              resources: ["gateways"]
              verbs: ["get", "list"]
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: ClusterRoleBinding
          metadata:
            name: embedding-gateway-setup-gateway-reader
          subjects:
            - kind: ServiceAccount
              name: embedding-gateway-setup
              namespace: ${namespace}
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: ClusterRole
            name: embedding-gateway-setup-gateway-reader
          ---
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: embedding-gateway-setup
            namespace: ${namespace}
          spec:
            backoffLimit: 4
            ttlSecondsAfterFinished: 60
            template:
              spec:
                restartPolicy: OnFailure
                serviceAccountName: embedding-gateway-setup
                containers:
                  - name: apply
                    image: alpine/k8s:1.30.0
                    command:
                      - /bin/bash
                      - -c
                      - |
                        {%- raw %}
                        set -euo pipefail

                        echo "Applying EnvoyProxy, Gateway, HTTPRoute..."
                        kubectl apply -f - <<'MANIFEST'
                        apiVersion: gateway.envoyproxy.io/v1alpha1
                        kind: EnvoyProxy
                        metadata:
                          name: internal-proxy
                          namespace: ${namespace}
                        spec:
                          provider:
                            type: Kubernetes
                            kubernetes:
                              envoyService:
                                type: ClusterIP
                        ---
                        apiVersion: gateway.networking.k8s.io/v1
                        kind: Gateway
                        metadata:
                          name: embedding-gateway
                          namespace: ${namespace}
                        spec:
                          gatewayClassName: envoy-gateway-class
                          infrastructure:
                            parametersRef:
                              group: gateway.envoyproxy.io
                              kind: EnvoyProxy
                              name: internal-proxy
                          listeners:
                          - name: http
                            port: 8000
                            protocol: HTTP
                            allowedRoutes:
                              namespaces:
                                from: Same
                        ---
                        apiVersion: gateway.networking.k8s.io/v1
                        kind: HTTPRoute
                        metadata:
                          name: nemotron-embedding-route
                          namespace: ${namespace}
                        spec:
                          parentRefs:
                          - name: embedding-gateway
                            namespace: ${namespace}
                          rules:
                          - matches:
                            - path:
                                type: PathPrefix
                                value: /
                            backendRefs:
                            - name: nemotron-embedding-ms
                              port: 8000
                        MANIFEST

                        echo "Waiting for Gateway embedding-gateway to be programmed..."
                        for i in $(seq 1 30); do
                          PROGRAMMED=$(kubectl get gateway embedding-gateway -n ${namespace} \
                            -o jsonpath='{.status.conditions[?(@.type=="Programmed")].status}' 2>/dev/null || true)
                          [[ "${PROGRAMMED}" == "True" ]] && break
                          echo "  waiting... (${i}/30)"
                          sleep 5
                        done
                        if [[ "${PROGRAMMED}" != "True" ]]; then
                          echo "ERROR: Gateway did not become programmed in time." >&2
                          exit 1
                        fi
                        echo "Gateway is programmed."

                        echo "Discovering auto-generated Envoy service in envoy-gateway-system..."
                        ENVOY_SVC=""
                        for i in $(seq 1 12); do
                          ENVOY_SVC=$(kubectl -n envoy-gateway-system get svc \
                            -l "gateway.envoyproxy.io/owning-gateway-name=embedding-gateway,gateway.envoyproxy.io/owning-gateway-namespace=${namespace}" \
                            -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
                          [[ -n "${ENVOY_SVC}" ]] && break
                          echo "  waiting for Envoy service... (${i}/12)"
                          sleep 5
                        done
                        if [[ -z "${ENVOY_SVC}" ]]; then
                          echo "ERROR: Could not find auto-generated Envoy service." >&2
                          exit 1
                        fi
                        echo "Found Envoy service: ${ENVOY_SVC}"

                        # Delete any existing embedding-proxy Service (selector-based type
                        # cannot be changed to ExternalName via apply — must delete first).
                        kubectl delete svc embedding-proxy -n ${namespace} --ignore-not-found=true

                        kubectl apply -f - <<EOF
                        apiVersion: v1
                        kind: Service
                        metadata:
                          name: embedding-proxy
                          namespace: ${namespace}
                        spec:
                          type: ExternalName
                          externalName: ${ENVOY_SVC}.envoy-gateway-system.svc.cluster.local
                        EOF
                        echo "Created ExternalName Service embedding-proxy -> ${ENVOY_SVC}.envoy-gateway-system.svc.cluster.local"
                        {% endraw %}
        readinessCheck:
          type: job
          name: embedding-gateway-setup
          timeout: 300

      # =====================================================================
      # Component 3: NVIDIA RAG Blueprint (Umbrella Chart)
      # =====================================================================
      - name: nvidia-rag-blueprint
        enabled: true
        dependsOn: [milvus, aidp-bootstrap-nim-cache, aidp-observability, embedding-gateway, weka-s3-lb, aidp-site-config]
        description: "NVIDIA RAG Blueprint — NIMs, ingestion pipeline, and RAG server (external Milvus)"
        helmChart:
          # Public classic HTTPS Helm repo (ChartMuseum) — no NGC auth required.
          # oci:// scheme for this registry returns 404; use https://.
          repository: https://helm.ngc.nvidia.com/nvidia/blueprint
          name: nvidia-blueprint-rag
          version: "v2.5.0"
          # Release name must be "rag" so subcharts produce the services
          # the blueprint hardcodes: rag-minio, rag-redis-master, rag-server.
          releaseName: rag
          crdsStrategy: Auto
        valuesFiles:
          - kind: ConfigMap
            name: aidp-site-config
            key: nvidia-rag-values
          - kind: ConfigMap
            name: aidp-site-config
            key: nvidia-gpu-profile
        readinessCheck:
          type: deployment
          name: rag-server
          # APPS-03 / Pitfall 4: NIM cold-start requires up to 1 hour for
          # model download on first deploy. Default 600s kills the deployment.
          timeout: 3600

      # =====================================================================
      # Component 3: PostgreSQL for Space Manager
      # =====================================================================
      - name: space-manager-postgres
        enabled: true
        dependsOn: [aidp-bootstrap-secrets]
        description: "PostgreSQL 16 for Space Manager eviction database"
        helmChart:
          repository: https://charts.bitnami.com/bitnami
          name: postgresql
          version: "18.6.1"
          releaseName: space-manager-postgres
          crdsStrategy: Skip
        values:
          # Force Service/StatefulSet name to "space-manager-postgres" (otherwise
          # the Bitnami chart appends "-postgresql", producing
          # "space-manager-postgres-postgresql" — which the DSN in
          # aidp-site-config.yaml does NOT match, causing DNS lookup failures
          # in the alembic-migrate init container.
          fullnameOverride: space-manager-postgres
          # Bitnami catalog change (Aug 2025): use bitnamilegacy mirror.
          image:
            registry: docker.io
            repository: bitnamilegacy/postgresql
          volumePermissions:
            image:
              registry: docker.io
              repository: bitnamilegacy/os-shell
          metrics:
            image:
              registry: docker.io
              repository: bitnamilegacy/postgres-exporter
          auth:
            existingSecret: space-manager-postgres-secrets
            database: space_manager
            username: space_manager
          primary:
            persistence:
              enabled: true
              size: 10Gi
        readinessCheck:
          # Operator's statefulset wait relies on .status.conditions[type=Ready]
          # which StatefulSets don't populate. Use pod-level Ready instead.
          type: pod
          selector: "app.kubernetes.io/instance=space-manager-postgres,app.kubernetes.io/name=postgresql"
          timeout: 300

      # =====================================================================
      # Component 4: AIDP (Unified Helm Chart)
      # Waits for: keycloak, nvidia-rag-blueprint, space-manager-postgres
      # =====================================================================
      - name: aidp
        enabled: true
        # keycloak-secret-sync transitively pulls in keycloak; aidp pods boot
        # with real Keycloak client secrets in env via envFrom on first start.
        # envoy-endpoint-discovery populates the envoy-endpoints ConfigMap so
        # the keycloakHostAlias.ip value is resolved before chart install.
        dependsOn: [keycloak-secret-sync, nvidia-rag-blueprint, envoy-endpoint-discovery, space-manager-postgres, aidp-site-config]
        description: "WEKA AIDP — GUI, Operator, RAG Gateway, RAG Bridge, Space Manager"
        helmChart:
          # The chart name must be just "aidp" — the operator derives the
          # helm alias from the repository URL and prefixes it automatically
          # (alias/<name>). "aidp/aidp" produced "aidp-helm/aidp/aidp" which
          # helm treats as a non-existent chart.
          repository: "https://weka.github.io/aidp-helm"
          name: aidp
          version: "0.1.41"
          releaseName: aidp
          crdsStrategy: Auto
        valuesFiles:
          - kind: ConfigMap
            name: aidp-site-config
            key: aidp-values
          # envoy-endpoints ships the auto-discovered Envoy ClusterIP. Layered
          # AFTER aidp-site-config so its `global.keycloakHostAlias.ip` value
          # overrides any placeholder in site-config via the operator's
          # deep-merge of valuesFiles entries.
          - kind: ConfigMap
            name: envoy-endpoints
            key: aidp-values
          # CFG-07 (2026-05-11): the aidp-secrets valuesFile reference was
          # removed — that Secret (`aidp-secrets`, key `aidp-secret-values`)
          # was never created by Component 0, so the reference was a stale
          # boilerplate footgun. appstack/aidp-secrets.yaml is regenerated
          # as placeholder-only documentation; the live Secrets ship inline
          # in Component 0 above. Restore this entry only if a follow-up
          # plan adds a real `aidp-secrets` Secret with chart values.
        readinessCheck:
          type: deployment
          name: aidp-gui
          timeout: 300

      # =====================================================================
      # Component 5: NVIDIA RAG Frontend (Optional — disabled by default)
      # AIDP GUI replaces this component. Enable only for NVIDIA-native UI.
      # Waits for: nvidia-rag-blueprint
      # =====================================================================
      - name: rag-frontend
        enabled: false
        dependsOn: [nvidia-rag-blueprint]
        description: "NVIDIA RAG Frontend web UI (optional — AIDP GUI replaces this)"
        helmChart:
          repository: oci://helm.ngc.nvidia.com/nvidia/blueprint/charts
          name: rag-frontend
          version: "2.5.0"
          releaseName: rag-frontend
          crdsStrategy: Skip
        readinessCheck:
          type: deployment
          name: rag-frontend
          timeout: 300
