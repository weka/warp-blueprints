            # ------------------------------------------------------------------
            # AIDP Observability Stack overrides
            # Customer-tunable knobs for the aidp-observability umbrella chart.
            # Chart-internal decisions (image tags, Loki single-binary mode,
            # OTEL processor pipelines, tail-sampling policy, Promtail pipeline
            # stages, datasource ConfigMaps, Phoenix exposure hostname) are locked
            # in helm/aidp-observability/values.yaml and are NOT customer-facing.
            # Override only the knobs listed here to avoid accidentally diverging
            # from the locked design (e.g., disabling auth_enabled: false on Loki).
            #
            # Operator runbook: appstack/DEPLOY.md §4 "aidp-observability-values"
            # Design rationale and locked decisions: .planning/OBSERVABILITY-PLAN.md §9
            # and .planning/phases/37-observability-infra-stack/37-CONTEXT.md (D-01..D-05)
            # ------------------------------------------------------------------
            aidp-observability-values: |
              # global.cluster.fqdn is required here — the aidp-observability chart is a
              # separate Helm release and does not inherit values from aidp-values.
              # Used to derive the Phoenix HTTPRoute hostname: "phoenix.<fqdn>".
              global:
                cluster:
                  fqdn: "[[ cluster_fqdn ]]"              # REQUIRED: replace with your cluster domain

              # Master toggle — set to false to disable the entire LGTM+Phoenix stack
              # (e.g., when bringing your own observability infra).
              observability:
                enabled: true
                # Prometheus Operator release label.
                # Override if your App Store init appstack installed kube-prometheus-stack
                # under a different release name. The default matches the current cluster
                # (verified via `kubectl -n monitoring get pods` — pod name
                # `prometheus-kube-prometheus-stack-prometheus-0` confirms release name).
                prometheusOperator:
                  releaseLabel: "kube-prometheus-stack"

              # ---------------------------------------------------------------
              # OTEL Collector cluster tag (multi-cluster deployments)
              # ---------------------------------------------------------------
              # The default `cluster=aidp-prod` is set inline in the umbrella values.yaml
              # at `opentelemetry-collector.config.processors.resource.attributes[0]`.
              # To override (e.g. multiple clusters sharing one Phoenix/Tempo backend),
              # supply the full list under that subchart path. Example:
              #
              # opentelemetry-collector:
              #   config:
              #     processors:
              #       resource:
              #         attributes:
              #           - key: cluster
              #             value: my-cluster-name
              #             action: upsert
              #
              # Subchart YAML is merged verbatim — there is intentionally no top-level
              # `observability.otel.*` shim.

              # ---------------------------------------------------------------
              # PVC sizing overrides — defaults already match OBSERVABILITY-PLAN §3.7.
              # Override only when log/trace/Phoenix volume exceeds the budget.
              # All three PVCs land on `storageclass-wekafs-dir-api`.
              # ---------------------------------------------------------------
              loki:
                persistence:
                  size: 200Gi
              tempo:
                persistence:
                  size: 100Gi
              phoenix:
                persistence:
                  size: 20Gi

              # ---------------------------------------------------------------
              # Retention overrides (Loki = 31 days, Tempo = 14 days per
              # OBSERVABILITY-PLAN §9). Customer can shrink to reclaim space.
              # ---------------------------------------------------------------
              # loki:
              #   limits_config:
              #     retention_period: 744h
              # tempo:
              #   tempo:
              #     retention: 336h

              # ---------------------------------------------------------------
              # Cross-namespace ReferenceGrant toggle. Default false — Phoenix
              # HTTPRoute and Phoenix Service are both in `monitoring`, so no
              # ReferenceGrant is structurally required. Enable ONLY if your
              # Gateway API install restricts parentRef permissions across
              # namespaces (some hardened clusters require this).
              # ---------------------------------------------------------------
              # phoenix:
              #   route:
              #     crossNamespaceReferenceGrant:
              #       enabled: false

            # ------------------------------------------------------------------
            # GPU Profile
            # Copy the contents of ONE profile file from helm/aidp/profiles/ here.
            # The 2xH100 profile is shown as the default example.
            #
            # Available profiles (copy the matching file's contents):
            #   helm/aidp/profiles/2xH100.yaml         — 2x H100 80GB (default)
            #   helm/aidp/profiles/3xA100.yaml         — 3x A100 80GB
            #   helm/aidp/profiles/8xH100.yaml         — 8x H100 80GB
            #   helm/aidp/profiles/3xH100-MIG.yaml     — 3x H100 with MIG slicing
            #   helm/aidp/profiles/2xRTX-PRO-6000.yaml — 2x RTX PRO 6000 48GB
            #   helm/aidp/profiles/4xRTX-PRO-6000.yaml — 4x RTX PRO 6000 48GB
            #   helm/aidp/profiles/8xRTX-PRO-6000.yaml — 8x RTX PRO 6000 48GB
            #   helm/aidp/profiles/4xRTX-PRO-6000-MIG.yaml — 4x RTX PRO 6000 with MIG
            #   helm/aidp/profiles/2xL40.yaml          — 2x L40 48GB
            #   helm/aidp/profiles/4xL40.yaml          — 4x L40 48GB
            #   helm/aidp/profiles/4xA10.yaml          — 4x A10 24GB
            #   helm/aidp/profiles/6xA10.yaml          — 6x A10 24GB
            #
            # See the deployment runbook for profile selection guidance (GPU count,
            # VRAM requirements, MIG vs time-slicing trade-offs).
            # ------------------------------------------------------------------
            nvidia-gpu-profile: |
              # =========================================================================
              # GPU Profile: 4x RTX PRO 6000 SE (96 GB each) — 3 nodes × 4 GPUs = 12 GPUs
              #
              # Chart path map (keys below MUST match the blueprint's values.yaml paths —
              # our previous profile used SERVICE NAMES, which the chart silently ignored):
              #   top-level nimOperator.*       → LLM + text embedding + text reranker
              #   nv-ingest.nimOperator.*       → doc-parsing NIMs (OCR, page/table/etc.)
              #
              # Key switch for nim-llm: engine=tensorrt_llm + FP8 + qosProfile=throughput
              # + TP=1 with explicit gpus.product=rtx6000_blackwell_sv.
              # Verified against the model-puller manifest in NIM 1.14.0 — this combo
              # matches exactly one profile entry. Without qosProfile and gpus.product
              # the NIM operator cannot disambiguate, hence "no profiles are selected
              # for caching" in nim-llm-cache.
              # vllm in this NIM image only ships hardware-generic bf16 profiles (no
              # vllm+fp8 entry exists), so vllm+fp8 always yields zero matches.
              # 49B FP8 (~50 GB) fits in a single 96 GB RTX PRO 6000 SE, so TP=1.
              #
              # ephemeral-storage requests stop the scheduler from packing >3 NIMs per
              # node (each NIM container image is 4–8 GB + TRT scratch can be 10+ GB).
              # =========================================================================

              nimOperator:
                nim-llm:
                  enabled: true
                  image:
                    repository: nvcr.io/nim/nvidia/llama-3.3-nemotron-super-49b-v1.5
                    tag: "1.14.0"
                    pullPolicy: IfNotPresent
                  model:
                    engine: tensorrt_llm        # NIM 1.14.0 ships fp8/throughput/tp=1 for rtx6000_blackwell_sv
                    precision: "fp8"
                    qosProfile: "throughput"
                    tensorParallelism: "1"
                    gpus:
                      - product: "rtx6000_blackwell_sv"
                  resources:
                    limits:
                      nvidia.com/gpu: 1
                    requests:
                      nvidia.com/gpu: 1
                      ephemeral-storage: "30Gi"
                  # nim-llm.env is INTENTIONALLY ABSENT here.
                  # CR-01 fix (2026-05-13): all nim-llm env entries (upstream + GPU-profile-specific
                  # + OTEL canonical block) are consolidated in the nvidia-rag-values data key
                  # (lines 318-356) to avoid Helm list-replacement stomping. The gpu-profile
                  # data key now only carries the non-list nim-llm overrides (image, model,
                  # resources, storage). See nvidia-rag-values comment above the nim-llm block
                  # for the rationale.
                  storage:
                    pvc:
                      create: false
                      name: "nim-llm-cache-pvc"
                  # Phase 43 (D-01/D-02): pin nim-llm to Node 3 (label set by Phase 44 runbook).
                  # The vendored llm-nim.yaml renders nodeSelector but NOT affinity, so a
                  # nodeSelector here propagates cleanly to the NIMService CR.
                  nodeSelector:
                    weka.io/nim-role: llm

                # Text embedding — exposes service "nemotron-embedding-ms"
                nvidia-nim-llama-32-nv-embedqa-1b-v2:
                  enabled: true
                  resources:
                    limits:
                      nvidia.com/gpu: 1
                    requests:
                      nvidia.com/gpu: 1
                      ephemeral-storage: "12Gi"
                  storage:
                    pvc:
                      create: false
                      name: "nemotron-embedding-ms-cache-pvc"
                  # Phase 43 (D-03/D-05): 2 replicas for nemotron-embedding-ms. The vendored
                  # embedding-nim.yaml line 39 renders `replicas: {{ $nimModel.replicas | default 1 }}`,
                  # so this propagates to the NIMService CR. Spread across nodes is handled
                  # by the post-install hook Job (helm/aidp/templates/nim-placement/...),
                  # NOT by topologySpreadConstraints (not a NIMService CRD field — RESEARCH §1).
                  replicas: 2

                # Text reranker — exposes service "nemotron-ranking-ms"
                nvidia-nim-llama-32-nv-rerankqa-1b-v2:
                  enabled: true
                  resources:
                    limits:
                      nvidia.com/gpu: 1
                    requests:
                      nvidia.com/gpu: 1
                      ephemeral-storage: "12Gi"
                  storage:
                    pvc:
                      create: false
                      name: "nemotron-ranking-ms-cache-pvc"

                # VLM services disabled — Access Preview only and use PDF document to image ingest
                nim-vlm:
                  enabled: false
                nvidia-nim-llama-nemotron-embed-vl-1b-v2:
                  enabled: false

              # Document-parsing NIMs live under nv-ingest.nimOperator.
              # S3/MinIO env vars are also here (not in nvidia-rag-values) because both
              # values keys have a top-level nv-ingest: section and the last-applied key
              # wins on merge collision — keeping all nv-ingest overrides here guarantees
              # they survive regardless of operator merge order.
              nv-ingest:
                envVars:
                  MINIO_INTERNAL_ADDRESS: "nginx-s3-lb-service.${namespace}.svc.cluster.local:9000"
                  MINIO_BUCKET: "aidp-bucket"
                  MINIO_ACCESS_KEY: "${wekaS3AccessKey}"
                  MINIO_SECRET_KEY: "${wekaS3SecretKey}"
                  IMAGE_STORAGE_URI: "s3://aidp-bucket/artifacts/store/images"
                  RAY_num_grpc_threads: "4"
                  INGEST_DISABLE_DYNAMIC_SCALING: "true"
                  EMBEDDING_NIM_ENDPOINT: "http://embedding-proxy.${namespace}.svc.cluster.local:8000/v1"
                nimOperator:
                  embedqa:
                    enabled: false              # embedding provided by top-level NIM

                  nemoretriever_ocr_v1:
                    enabled: true
                    resources:
                      limits:
                        nvidia.com/gpu: 1
                      requests:
                        nvidia.com/gpu: 1
                        ephemeral-storage: "12Gi"
                    storage:
                      pvc:
                        create: false
                        name: "nemoretriever-ocr-v1-pvc"

                  page_elements:
                    enabled: true
                    resources:
                      limits:
                        nvidia.com/gpu: 1
                      requests:
                        nvidia.com/gpu: 1
                        ephemeral-storage: "12Gi"
                    storage:
                      pvc:
                        create: false
                        name: "nemoretriever-page-elements-v3-pvc"

                  graphic_elements:
                    enabled: true
                    resources:
                      limits:
                        nvidia.com/gpu: 1
                      requests:
                        nvidia.com/gpu: 1
                        ephemeral-storage: "12Gi"
                    storage:
                      pvc:
                        create: false
                        name: "nemoretriever-graphic-elements-v1-pvc"

                  table_structure:
                    enabled: true
                    resources:
                      limits:
                        nvidia.com/gpu: 1
                      requests:
                        nvidia.com/gpu: 1
                        ephemeral-storage: "12Gi"
                    storage:
                      pvc:
                        create: false
                        name: "nemoretriever-table-structure-v1-pvc"

                  nemotron_parse:
                    enabled: false
                    resources:
                      limits:
                        nvidia.com/gpu: 1
                      requests:
                        nvidia.com/gpu: 1
                        ephemeral-storage: "12Gi"

            # ------------------------------------------------------------------
            # Clustered Milvus 2.6.3 (external to the NVIDIA RAG blueprint)
            # CPU-only. S3-backed segment storage via WEKA S3; Kafka MQ.
            # Applied to the zilliztech/milvus chart (chart 5.0.5).
            # Connects to WEKA S3 at 192.168.1.1:9000; stores data in
            # aidp-bucket under the "milvus" root path prefix.
            #
            # IMPORTANT: ${wekaS3AccessKey} and ${wekaS3SecretKey} are substituted
            # at apply time via envsubst — see DEPLOY.md §6.
            # ------------------------------------------------------------------
            milvus-values: |
              cluster:
                enabled: true
              streaming:
                enabled: true        # 2.6 streaming-node (replaces legacy query path)
              attu:
                enabled: true        # admin UI; exposed via Envoy HTTPRoute (attuRoute)
              indexNode:
                enabled: false       # merged into queryNode/dataNode in 2.6
              woodpecker:
                enabled: false       # disabled — WEKA S3 lacks PutObjectIfNoneMatch fencing semantics
              pulsar:
                enabled: false
              pulsarv3:
                enabled: false
              kafka:
                enabled: true        # bundled Kafka subchart — MQ for streaming node

              image:
                all:
                  repository: milvusdb/milvus
                  tag: v2.6.3
                  pullPolicy: IfNotPresent

              persistence:
                enabled: false       # no POSIX PVC needed — all storage via WEKA S3

              etcd:
                enabled: true
                replicaCount: 3        # HA for cluster mode
                persistence:
                  storageClass: "storageclass-wekafs-dir-api"
                  size: "10Gi"
                persistentVolumeClaimRetentionPolicy:
                  enabled: true
                  whenDeleted: Delete
                  whenScaled: Retain

              # WEKA S3 connection. No MinIO pod is deployed (enabled: false).
              # Credentials substituted at apply time via envsubst (see DEPLOY.md §6).
              minio:
                enabled: false
                tls:
                  enabled: false
                address: "nginx-s3-lb-service.${namespace}.svc.cluster.local"
                port: 9000
                accessKey: "${wekaS3AccessKey}"
                secretKey: "${wekaS3SecretKey}"
                useSSL: false
                bucketName: "aidp-bucket"
                rootPath: "milvus"
                region: ""
                useIAM: false
                cloudProvider: "aws"
                iamEndpoint: ""
                existingSecret: ""

              # Milvus 2.6 config overrides: S3 remote storage + Kafka MQ.
              # minio.* here writes directly to the Milvus process config — this is what
              # controls the actual S3 endpoint, NOT the chart-level minio.address value
              # (which only configures the bundled MinIO subchart and is ignored here).
              extraConfigFiles:
                user.yaml: |+
                  minio:
                    address: nginx-s3-lb-service.${namespace}.svc.cluster.local
                    port: 9000
                    accessKeyID: "${wekaS3AccessKey}"
                    secretAccessKey: "${wekaS3SecretKey}"
                    useSSL: false
                    bucketName: aidp-bucket
                    rootPath: milvus
                    useVirtualHost: false
                  mq:
                    type: kafka
                  common:
                    storageType: remote
                    storage:
                      enablev2: true
                  # Preload mmap'd segment data into memory at segment-load time instead of
                  # faulting it in from disk on first query. Milvus 2.6 here uses StorageV2 +
                  # tiered storage (mmap local_chunk cache); without warmup the FIRST query
                  # against a freshly loaded/re-ingested segment pays a multi-second cold disk
                  # read (~12s observed); warm queries are ~20ms. "sync" blocks the segment
                  # load until data is cached, eliminating cold-start latency. (The older
                  # queryNode.cache.warmup is the deprecated alias for these keys in 2.6.)
                  queryNode:
                    segcore:
                      tieredStorage:
                        warmup:
                          vectorField: sync
                          vectorIndex: sync
                          scalarField: sync
                          scalarIndex: sync

            # ------------------------------------------------------------------
            # AIDP unified chart values
            # Applied to the aidp Helm chart (Component 4 in the AppStack).
            # All <replace-me> values are site-specific — fill in before applying.
            # ------------------------------------------------------------------
            aidp-values: |
              # =====================================================================
              # Customer-facing minimum (v3.1 — audit §3.3 shape)
              # The customer types each FQDN/IP ONCE:
              #   - global.keycloak.fqdn          (Keycloak external FQDN)
              #   - global.weka.host              (WEKA cluster management IP)
              #   - gui.baseUrl                   (AIDP GUI external URL)
              # Every other URL/hostname is derived in helm/aidp/templates/_helpers.tpl.
              # =====================================================================
              global:
                namespace: ${namespace}

                # Envoy Gateway (pre-installed by the WEKA App Store)
                envoy:
                  gatewayName: "warp-edge-gateway"
                  gatewayNamespace: "envoy-gateway-system"

                # Keycloak — single source of truth for the FQDN, OIDC scheme, realm.
                # All issuer / JWKS / baseUrl / hostname references derive from these
                # four values via _helpers.tpl. The customer types "keycloak.example.com"
                # exactly once.
                keycloak:
                  fqdn: "[[ keycloak_fqdn ]]"     # external Keycloak FQDN
                  scheme: "http"                   # "http" preserves current live-cluster behavior; override to "https" with TLS
                  realm: "rag-gateway"             # OIDC realm name (matches the imported realm JSON)
                  basePath: "/auth"                # Keycloak --http-relative-path

                # WEKA — cluster management IP/host and REST API port. Customer types
                # the IP ONCE here; spaceManager.weka.apiHost and operator's
                # WATCHER_WEKA_HOST/PORT all derive from this via aidp.wekaApiHost.
                weka:
                  host: "[[ weka_api_host ]]"              # e.g. 172.3.4.248 (WEKA cluster management IP)
                  port: 14000

                # Keycloak hostname resolution inside pods (avoids DNS hairpin loop).
                # `ip` is AUTO-POPULATED at install time by the
                # `envoy-endpoint-discovery` AppStack component. `hostname` is
                # DERIVED from global.keycloak.fqdn via aidp.keycloakHostname.
                keycloakHostAlias:
                  enabled: true

              gui:
                baseUrl: "[[ gui_base_url ]]"     # e.g. https://aidp.example.com — gui.hostname is DERIVED from baseUrl

              # Override the published AIDP chart's default ("keycloak"). The
              # codecentric/keycloakx chart names its main Service "<fullname>-http"
              # (with fullnameOverride: keycloak we get "keycloak-http"). Both the
              # HTTPRoute backendRef and the in-cluster secret-sync references must
              # match this name. Will be folded into the chart's values.yaml default
              # in the next chart version bump.
              keycloak:
                serviceName: keycloak-http

              # rag-bridge talks to Keycloak SERVER-SIDE (client-credentials token + admin
              # user lookup for uid/gids) — not browser OIDC — so it targets the in-cluster
              # Keycloak Service directly, exactly like the keycloak-secret-sync Job
              # (keycloak-http.rag.svc + /auth). This avoids the external FQDN + hostAlias
              # path that only rag-gateway needs (its OIDC_ISSUER must match the token iss).
              # /auth is Keycloak's --http-relative-path (global.keycloak.basePath). This
              # overrides aidp.keycloakBaseUrl, which currently omits basePath.
              ragBridge:
                keycloak:
                  baseUrl: "http://keycloak-http.${namespace}.svc.cluster.local/auth"

              ragFrontendRoute:
                enabled: false             # AIDP GUI replaces the NVIDIA RAG Frontend
                hostname: ""               # unused while disabled; set FQDN if re-enabling

              attuRoute:
                enabled: true
                hostname: "[[ attu_hostname ]]"   # bare FQDN for Envoy HTTPRoute → milvus-attu:3000

              operator:
                weka:
                  # host/port DERIVED from global.weka.{host,port} via aidp.wekaHost helper
                  storageClassName: "storageclass-wekafs-fs-static"
                  storageSize: "100Gi"

              spaceManager:
                weka:
                  # apiHost DERIVED from global.weka.{host,port} via aidp.wekaApiHost helper
                  # vectordbFilesystemName is resolved to a UUID by the weka-fs-discovery
                  # pre-install Job (see CFG-08); supply the human-readable filesystem name.
                  vectordbFilesystemName: "[[ vectordb_filesystem_name ]]"      # human-readable WEKA filesystem name (matches the FS as named in the WEKA console)

              # =====================================================================
              # Observability — chart-side OTEL + JSON-logging knobs (Phase 39 D-03-D)
              # ---------------------------------------------------------------------
              # These values populate the AIDP chart's `observability:` block in
              # helm/aidp/values.yaml. The `aidp.observabilityEnv` helper consumes them
              # to inject 5 env vars (OTEL_EXPORTER_OTLP_ENDPOINT, OTEL_SERVICE_NAME,
              # OTEL_SERVICE_VERSION, DEPLOYMENT_ENV, LOG_LEVEL) into every AIDP service
              # Deployment (rag-gateway in Phase 39; rag-bridge / space-manager /
              # watcher / aidp-gui / aidp-gui-operator follow in Phase 40).
              #
              # IMPORTANT: these are CHART-SIDE values for the `aidp` chart and belong
              # under `aidp-values`. They are SEPARATE from the Phase 37 OTEL Collector
              # / Tempo / Loki / Phoenix infrastructure values, which live in
              # `aidp-observability-values` above (Phase 37 D-01 split).
              #
              # Default endpoint targets the Phase 37 OTEL Collector at its cluster-
              # internal gRPC address; override if you run the collector elsewhere
              # (e.g., a side-by-side OpenTelemetry collector in a different namespace).
              # =====================================================================
              observability:
                otel:
                  endpoint: "otel-collector.${namespace}.svc.cluster.local:4317"
                  deploymentEnv: "prod"
                logLevel: "INFO"

      # =====================================================================
      # Component 0: WEKA S3 Load Balancer
      # nginx reverse proxy that load-balances across WEKA S3 nodes, exposing
      # a stable ClusterIP (nginx-s3-lb-service.${namespace}.svc.cluster.local:9000)
      # consumed by Milvus, nv-ingest, and the RAG pipeline.
      # SITE-SPECIFIC: update the upstream block IPs in the ConfigMap below
      # to match your WEKA cluster's S3 node IPs before applying.
      # Run: weka cluster nodes --role S3 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+'
      # =====================================================================
      - name: weka-s3-lb
        enabled: true
        dependsOn: []
        description: "nginx S3 load balancer — stable ClusterIP in front of WEKA S3 nodes"
        kubernetesManifest: |
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: weka-s3-lb-nginx-config
            namespace: ${namespace}
          data:
            nginx.conf: |
              # SITE-SPECIFIC: Replace these IPs with your WEKA cluster's S3 node IPs.
              # Run: weka cluster nodes --role S3 | grep -oE '[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+'
              # to enumerate them. Port 9000 is the standard WEKA S3 port.
              upstream weka_s3 {
                 least_conn;
              {%- for ip in weka_s3_node_ips.replace(',', ' ').split() %}
              server [[ ip ]]:9000;
              {%- endfor %}
              }
              server {
                 listen       9000;
                 listen  [::]:9000;
                 server_name _;

                 ignore_invalid_headers off;
                 client_max_body_size 0;
                 proxy_buffering off;
                 proxy_request_buffering off;

                 location /healthz {
                    access_log off;
                    return 200 "ok\n";
                    add_header Content-Type text/plain;
                 }

                 location / {
                    proxy_set_header Host $http_host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;

                    proxy_connect_timeout 300;
                    proxy_read_timeout    300;
                    proxy_send_timeout    300;
                    proxy_http_version 1.1;
                    proxy_set_header Connection "";
                    chunked_transfer_encoding off;

                    proxy_pass http://weka_s3;
                 }
              }
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: nginx-deployment
            namespace: ${namespace}
          spec:
            selector:
              matchLabels:
                app: nginx
            replicas: 1
            strategy:
              type: Recreate
            template:
              metadata:
                labels:
                  app: nginx
              spec:
                hostNetwork: true
                dnsPolicy: ClusterFirstWithHostNet
                nodeSelector:
                  weka.io/nim-role: llm
                containers:
                - name: nginx
                  image: nginx:1.27.2
                  ports:
                  - containerPort: 9000
                  readinessProbe:
                    httpGet:
                      path: /healthz
                      port: 9000
                    initialDelaySeconds: 3
                    periodSeconds: 10
                    failureThreshold: 3
                  livenessProbe:
                    httpGet:
                      path: /healthz
                      port: 9000
                    initialDelaySeconds: 10
                    periodSeconds: 30
                    failureThreshold: 3
                  lifecycle:
                    preStop:
                      exec:
                        command: ["/bin/sh", "-c", "nginx -s quit; sleep 5"]
                  volumeMounts:
                    - name: nginx-config
                      mountPath: /etc/nginx/conf.d/default.conf
                      subPath: nginx.conf
                volumes:
                  - name: nginx-config
                    configMap:
                      name: weka-s3-lb-nginx-config
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: nginx-s3-lb-service
            namespace: ${namespace}
          spec:
            type: ClusterIP
            selector:
              app: nginx
            ports:
              - port: 9000
                targetPort: 9000

      # =====================================================================
      # Component 1: Bootstrap Secrets
      # Applied early so subsequent Helm charts find their existingSecret
      # references. Source-of-truth mirror of appstack/aidp-secrets.yaml
      # (active secrets only; commented placeholders omitted).
      # Every other component dependsOn this.
      # =====================================================================
      - name: aidp-bootstrap-secrets
        enabled: true
        dependsOn: []
        description: "Bootstrap secrets required by all downstream components"
        kubernetesManifest: |
          # CFG-09 (2026-05-11): the cleartext nvapi-... token previously
          # embedded directly in this manifest (in ngc-secret and ngc-api
          # 3-alias) is removed. The customer creates ONE Secret named
          # `ngc-api-key` (key: apiKey) containing the nvapi-... token,
          # and the AIDP helm chart's `ngc-secret-materialize` pre-install
          # Job (helm/aidp/templates/ngc-secret-materialize-job.yaml) reads
          # that input and materializes both `ngc-secret` (dockerconfigjson)
          # and `ngc-api` (3-alias Opaque) at install time. Closes the
          # CC-3 SEC-01 plaintext-secrets-in-source gap.
          #
          # CFG-09-FIX-04 (Phase 35, 2026-05-12): the Phase 34 placeholder
          # sentinel is replaced with the template variable <ngcApiKey>
          # (placeholder-form rendering to keep substituted output free of
          # the customer's real token — see comment block below the
          # stringData line). Resolved either by client-side `envsubst`
          # (developer flow) or by the WEKA App Store operator's static
          # variable substitution (App Store flow). Single substitution
          # surface replaces the Phase 34 Option A/B split.
          #
          # keycloak-admin-secret — Keycloak admin console password
          apiVersion: v1
          kind: Secret
          metadata:
            name: keycloak-admin-secret
            namespace: ${namespace}
          type: Opaque
          stringData:
            admin-password: "Password123"
          ---
          # aidp-gui-secrets — OIDC credentials for the AIDP GUI's Keycloak client.
          # KEYCLOAK_CLIENT_ID matches the "aidp-gui" client in the realm import.
          # KEYCLOAK_CLIENT_SECRET is a placeholder here — Keycloak 25+ discards
          # client secrets during realm import, so the real value is set via the
          # Admin API after AppStack reaches Ready (see DEPLOY.md §9a) and this
          # Secret is then patched to match.
          # SESSION_SECRET must be a random 32+ byte string (openssl rand -hex 32).
          apiVersion: v1
          kind: Secret
          metadata:
            name: aidp-gui-secrets
            namespace: ${namespace}
          type: Opaque
          stringData:
            KEYCLOAK_CLIENT_ID: "aidp-gui"
            KEYCLOAK_CLIENT_SECRET: "<replace-me>"
            SESSION_SECRET: "<replace-me>"
          ---
          # aidp-gui-operator-secrets — WEKA API token used by the Kopf operator
          apiVersion: v1
          kind: Secret
          metadata:
            name: aidp-gui-operator-secrets
            namespace: ${namespace}
          type: Opaque
          stringData:
            WATCHER_WEKA_TOKEN: "eyJhbGciOiJSUzI1NiIsIml0dCI6IkJBQ0tFTkQiLCJ0eXAiOiJKV1QifQ.eyJleHAiOjE3ODQ1OTMzNzEsImlhdCI6MTc3NjgxNzM3MSwiaXR0IjoiQkFDS0VORCIsInN1YiI6eyJndWlkIjoiMDAwMDAwMDAtMDAwMC0wMDAwLTAwMDAtMDAwMDAwMDAwMDAwIiwib3JnX2lkIjowLCJyZXZvY2F0aW9uX2N5Y2xlIjowLCJyb2xlIjoiQ2x1c3RlckFkbWluVXNlciIsInNvdXJjZSI6IkludGVybmFsIiwidXNlcm5hbWUiOiJhZG1pbiJ9fQ.VXnbYoiTB_751leMVOTaduhAYrqcF9gsiE5k7awZQA725p2Lq6As4-sGQGL8rMk4r2eYbPXJINEdptGBqV0J0y3Hn4YyIhGaW9cJsHHXTrizv5MFNvOJMDICFNY9uc7LjcXCEglYP8XkGk3vRJxr9za6CP0sfk99Pnsr54GMaBgGO-nlxXiPqbqPKxV6x84Tf4AEQt5I-n-e1MEk_a-JGU5FoVkWL48LM8elPyM5ixtajFmbU9uT7muLP6LzwpjOGOkOto5orkEozb38A5JQFu2VUUlWXqrk0N88GkgOBIy5pOQMjUZ_x2p-n7DMzk0c3mao0XW19I_sVtdDf9p_fg"
          ---
          # rag-gateway-secrets — RAG Gateway API keys
          # CFG-07 (2026-05-11): TOOL_API_KEY removed from per-service Secrets;
          # see tool-api-key Secret below — single source of truth.
          apiVersion: v1
          kind: Secret
          metadata:
            name: rag-gateway-secrets
            namespace: ${namespace}
          type: Opaque
          stringData:
            OPENAI_API_KEY: "replace-me"
          ---
          # rag-bridge-secrets — RAG Bridge Keycloak client (TOOL_API_KEY removed; see tool-api-key Secret below)
          # KEYCLOAK_CLIENT_ID matches the "rag-bridge" client in the realm import
          # (mirrors aidp-gui above). KEYCLOAK_CLIENT_SECRET is a placeholder here —
          # Keycloak 25+ discards client secrets during realm import, so the real
          # value is patched in by the keycloak-secret-sync Job (sync_client rag-bridge).
          apiVersion: v1
          kind: Secret
          metadata:
            name: rag-bridge-secrets
            namespace: ${namespace}
          type: Opaque
          stringData:
            KEYCLOAK_CLIENT_ID: "rag-bridge"
            KEYCLOAK_CLIENT_SECRET: "<replace-me>"
          ---
          # tool-api-key — single TOOL_API_KEY Secret consumed by both
          # rag-gateway and rag-bridge Deployments via secretKeyRef. CFG-07
          # eliminates the audit §1.8 duplicate "MUST match" coupling.
          apiVersion: v1
          kind: Secret
          metadata:
            name: tool-api-key
            namespace: ${namespace}
            labels:
              app.kubernetes.io/managed-by: aidp-bootstrap
              app.kubernetes.io/component: tool-api-key
          type: Opaque
          stringData:
            TOOL_API_KEY: "f08783f6-4cf3-484c-b628-1861aff66fcd"
          ---
          # space-manager-secrets — Space Manager runtime env (Postgres DSN +
          # WEKA REST API credentials). All three keys are loaded as env vars
          # via envFrom in the space-manager Deployment. SM_WEKA_API_USER and
          # SM_WEKA_API_PASSWORD are required at startup (config.py raises
          # "SM_WEKA_API_USER is required" / "...PASSWORD is required" if missing).
          apiVersion: v1
          kind: Secret
          metadata:
            name: space-manager-secrets
            namespace: ${namespace}
          type: Opaque
          stringData:
            SM_POSTGRES_DSN: "postgresql+asyncpg://space_manager:Password123@space-manager-postgres.${namespace}.svc.cluster.local:5432/space_manager"
            SM_WEKA_API_USER: "spaceman"      # WEKA REST API username (e.g. "spaceman")
            SM_WEKA_API_PASSWORD: "Password123"  # WEKA REST API password
          ---
          # space-manager-postgres-secrets — Space Manager PostgreSQL pod credentials
          apiVersion: v1
          kind: Secret
          metadata:
            name: space-manager-postgres-secrets
            namespace: ${namespace}
          type: Opaque
          stringData:
            password: "Password123"
            postgres-password: "Password123"

      # =====================================================================
      # Component 0.5: NGC Secret Materialize (CFG-09-FIX, Phase 34, 2026-05-11)
      # Reads the customer-supplied `ngc-api-key` Secret (key: apiKey) and
      # materializes `ngc-secret` (dockerconfigjson) and `ngc-api` (3-alias
      # Opaque) in the `rag` namespace BEFORE nvidia-rag-blueprint installs.
      # Replaces helm/aidp/templates/ngc-secret-materialize-job.yaml, which
      # ran as a pre-install hook of the aidp helm chart — too late in the
      # dependency graph (the aidp release is LAST). See appstack/DEPLOY.md
      # §3.1 for the customer workflow.
      # =====================================================================
      - name: aidp-bootstrap-ngc-secrets
        enabled: true
        dependsOn: [aidp-bootstrap-secrets]
        description: "Materialize ngc-secret (dockerconfigjson) and ngc-api (3-alias Opaque) in the rag namespace from the App Store nvidia-ngc credential's derived secrets in wekaappstore."
        kubernetesManifest: |
          # Sources the NGC key material from the WEKA App Store credential the
          # operator selected on the install form. The credential's derived
          # secrets live in the wekaappstore namespace:
          #   warp-<ngc_credential>-docker  (kubernetes.io/dockerconfigjson, nvcr.io)
          #   warp-<ngc_credential>-apikey  (Opaque, key NGC_API_KEY)
          # This Job copies the docker pull secret into rag as `ngc-secret` and
          # re-materializes the 3-alias Opaque `ngc-api` that nv-ingest hardcodes.
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: ngc-secret-materialize
            namespace: ${namespace}
            labels:
              app.kubernetes.io/name: ngc-secret-materialize
              app.kubernetes.io/component: appstack-bootstrap
          ---
          # rag-namespace Role: create the output secrets + manage them by name.
          apiVersion: rbac.authorization.k8s.io/v1
          kind: Role
          metadata:
            name: ngc-secret-materialize
            namespace: ${namespace}
          rules:
            - apiGroups: [""]
              resources: ["secrets"]
              verbs: ["create"]
            - apiGroups: [""]
              resources: ["secrets"]
              resourceNames: ["ngc-api", "ngc-secret"]
              verbs: ["get", "update", "patch"]
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata:
            name: ngc-secret-materialize
            namespace: ${namespace}
          subjects:
            - kind: ServiceAccount
              name: ngc-secret-materialize
              namespace: ${namespace}
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: Role
            name: ngc-secret-materialize
          ---
          # wekaappstore-namespace Role: read ONLY the two derived secrets for
          # the selected credential. Created in wekaappstore; bound to the rag SA.
          apiVersion: rbac.authorization.k8s.io/v1
          kind: Role
          metadata:
            name: ngc-secret-materialize-read
            namespace: wekaappstore
          rules:
            - apiGroups: [""]
              resources: ["secrets"]
              resourceNames: ["warp-[[ ngc_credential ]]-apikey", "warp-[[ ngc_credential ]]-docker"]
              verbs: ["get"]
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata:
            name: ngc-secret-materialize-read
            namespace: wekaappstore
          subjects:
            - kind: ServiceAccount
              name: ngc-secret-materialize
              namespace: ${namespace}
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: Role
            name: ngc-secret-materialize-read
          ---
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: ngc-secret-materialize
            namespace: ${namespace}
            labels:
              app.kubernetes.io/name: ngc-secret-materialize
              app.kubernetes.io/component: appstack-bootstrap
          spec:
            backoffLimit: 3
            ttlSecondsAfterFinished: 60
            template:
              spec:
                restartPolicy: OnFailure
                serviceAccountName: ngc-secret-materialize
                containers:
                  - name: materialize
                    image: alpine/k8s:1.30.0
                    env:
                      - name: NS
                        valueFrom:
                          fieldRef:
                            fieldPath: metadata.namespace
                      # Derived-secret names built from the selected credential
                      # ([[ ngc_credential ]] is resolved by the GUI at install).
                      - name: NGC_APIKEY_SECRET
                        value: "warp-[[ ngc_credential ]]-apikey"
                      - name: NGC_DOCKER_SECRET
                        value: "warp-[[ ngc_credential ]]-docker"
                    command:
                      - /bin/bash
                      - -c
                      - |
                        {%- raw %}
                        set -euo pipefail
                        echo "Copying NGC docker pull secret from wekaappstore/${NGC_DOCKER_SECRET}..."
                        DCJ=$(kubectl get secret "${NGC_DOCKER_SECRET}" -n wekaappstore -o jsonpath='{.data.\.dockerconfigjson}')
                        if [[ -z "${DCJ}" ]]; then
                          echo "ERROR: ${NGC_DOCKER_SECRET} not found / empty in wekaappstore." >&2
                          echo "Hint: register an NVIDIA NGC credential on the Settings page and wait for it to sync." >&2
                          exit 1
                        fi
                        cat <<EOF | kubectl apply -f -
                        apiVersion: v1
                        kind: Secret
                        metadata:
                          name: ngc-secret
                          namespace: ${NS}
                          labels:
                            app.kubernetes.io/managed-by: aidp-bootstrap
                            app.kubernetes.io/component: ngc-secret-materialize
                        type: kubernetes.io/dockerconfigjson
                        data:
                          .dockerconfigjson: "${DCJ}"
                        EOF

                        echo "Reading NGC API key from wekaappstore/${NGC_APIKEY_SECRET}..."
                        NGC_KEY=$(kubectl get secret "${NGC_APIKEY_SECRET}" -n wekaappstore -o jsonpath='{.data.NGC_API_KEY}' | base64 -d)
                        if [[ -z "${NGC_KEY}" ]]; then
                          echo "ERROR: NGC_API_KEY missing in ${NGC_APIKEY_SECRET}." >&2
                          exit 1
                        fi
                        cat <<EOF | kubectl apply -f -
                        apiVersion: v1
                        kind: Secret
                        metadata:
                          name: ngc-api
                          namespace: ${NS}
                          labels:
                            app.kubernetes.io/managed-by: aidp-bootstrap
                            app.kubernetes.io/component: ngc-secret-materialize
                        type: Opaque
                        stringData:
                          NGC_API_KEY: "${NGC_KEY}"
                          NVIDIA_API_KEY: "${NGC_KEY}"
                          NGC_CLI_API_KEY: "${NGC_KEY}"
                        EOF
                        echo "Materialized ngc-secret and ngc-api in ${NS}."
                        {% endraw %}
        readinessCheck:
          type: job
          name: ngc-secret-materialize
          timeout: 180

      - name: aidp-bootstrap-weka-token
        enabled: true
        dependsOn: [aidp-bootstrap-secrets]
        description: "Patch aidp-gui-operator-secrets.WATCHER_WEKA_TOKEN from the App Store weka-storage credential's derived secret (wekaappstore/warp-<weka_credential>-token)."
        kubernetesManifest: |
          # The WEKA App Store weka-storage credential produces a derived secret
          #   warp-<weka_credential>-token  (Opaque: WEKA_API_USERNAME, WEKA_API_TOKEN, WEKA_API_ENDPOINT)
          # in the wekaappstore namespace. The AIDP operator (Kopf) reads the WEKA
          # REST API JWT from aidp-gui-operator-secrets.WATCHER_WEKA_TOKEN in rag,
          # so this Job copies the credential's WEKA_API_TOKEN into that key.
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: weka-token-sync
            namespace: ${namespace}
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: Role
          metadata:
            name: weka-token-sync
            namespace: ${namespace}
          rules:
            - apiGroups: [""]
              resources: ["secrets"]
              resourceNames: ["aidp-gui-operator-secrets"]
              verbs: ["get", "patch"]
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata:
            name: weka-token-sync
            namespace: ${namespace}
          subjects:
            - kind: ServiceAccount
              name: weka-token-sync
              namespace: ${namespace}
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: Role
            name: weka-token-sync
          ---
          # Read-only access to the single derived weka-storage secret in wekaappstore.
          apiVersion: rbac.authorization.k8s.io/v1
          kind: Role
          metadata:
            name: weka-token-sync-read
            namespace: wekaappstore
          rules:
            - apiGroups: [""]
              resources: ["secrets"]
              resourceNames: ["warp-[[ weka_credential ]]-token"]
              verbs: ["get"]
          ---
          apiVersion: rbac.authorization.k8s.io/v1
          kind: RoleBinding
          metadata:
            name: weka-token-sync-read
            namespace: wekaappstore
          subjects:
            - kind: ServiceAccount
              name: weka-token-sync
              namespace: ${namespace}
          roleRef:
            apiGroup: rbac.authorization.k8s.io
            kind: Role
            name: weka-token-sync-read
          ---
          apiVersion: batch/v1
          kind: Job
          metadata:
            name: weka-token-sync
            namespace: ${namespace}
          spec:
            backoffLimit: 3
            ttlSecondsAfterFinished: 60
            template:
              spec:
                restartPolicy: OnFailure
                serviceAccountName: weka-token-sync
                containers:
                  - name: sync
                    image: alpine/k8s:1.30.0
                    env:
                      - name: NS
                        valueFrom:
                          fieldRef:
                            fieldPath: metadata.namespace
                      - name: WEKA_TOKEN_SECRET
                        value: "warp-[[ weka_credential ]]-token"
                    command:
                      - /bin/bash
                      - -c
                      - |
                        {%- raw %}
                        set -euo pipefail
                        echo "Reading WEKA API token from wekaappstore/${WEKA_TOKEN_SECRET}..."
                        # .data is already base64 — copy base64->base64 into the target.
                        TOKEN_B64=$(kubectl get secret "${WEKA_TOKEN_SECRET}" -n wekaappstore -o jsonpath='{.data.WEKA_API_TOKEN}')
                        if [[ -z "${TOKEN_B64}" ]]; then
                          echo "ERROR: WEKA_API_TOKEN missing in ${WEKA_TOKEN_SECRET}." >&2
                          echo "Hint: register a WEKA storage credential on the Settings page and wait for it to sync." >&2
                          exit 1
                        fi
                        kubectl -n "${NS}" patch secret aidp-gui-operator-secrets --type='json' \
                          -p="[{\"op\":\"replace\",\"path\":\"/data/WATCHER_WEKA_TOKEN\",\"value\":\"${TOKEN_B64}\"}]"
                        echo "Patched aidp-gui-operator-secrets.WATCHER_WEKA_TOKEN from the WEKA credential."
                        {% endraw %}
        readinessCheck:
          type: job
          name: weka-token-sync
          timeout: 180

      - name: aidp-keycloak-realm-config
        enabled: true
        dependsOn: [aidp-bootstrap-secrets]
        description: "Keycloak realm import ConfigMap (rag-gateway realm definition)"
        kubernetesManifest: |
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: keycloak-realm-config
            namespace: ${namespace}
