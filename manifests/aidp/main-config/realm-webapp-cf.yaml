apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm-import
  namespace: rag
data:
  rag-realm.json: |
    {
      "realm": "rag",
      "enabled": true,

      "clients": [
        {
          "clientId": "rag-gateway",
          "enabled": true,
          "protocol": "openid-connect",
          "publicClient": false,
          "directAccessGrantsEnabled": true,
          "standardFlowEnabled": false,
          "implicitFlowEnabled": false
        }
      ],

      "clientScopes": [
        {
          "name": "rag-gateway-aud",
          "protocol": "openid-connect",
          "protocolMappers": [
            {
              "name": "audience-rag-gateway",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-audience-mapper",
              "config": {
                "included.client.audience": "rag-gateway",
                "access.token.claim": "true"
              }
            }
          ]
        },
        {
          "name": "gateway-claims",
          "protocol": "openid-connect",
          "protocolMappers": [
            {
              "name": "uid",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-attribute-mapper",
              "config": {
                "user.attribute": "uid",
                "claim.name": "uid",
                "jsonType.label": "int",
                "access.token.claim": "true"
              }
            },
            {
              "name": "gids",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-usermodel-attribute-mapper",
              "config": {
                "user.attribute": "gids",
                "claim.name": "gids",
                "multivalued": "true",
                "jsonType.label": "String",
                "access.token.claim": "true"
              }
            },
            {
              "name": "group-principals",
              "protocol": "openid-connect",
              "protocolMapper": "oidc-group-membership-mapper",
              "config": {
                "claim.name": "principals",
                "full.path": "true",
                "access.token.claim": "true"
              }
            }
          ]
        }
      ],

      "defaultDefaultClientScopes": [
        "profile",
        "email",
        "roles",
        "gateway-claims"
      ],

      "clientsDefaultClientScopes": {
        "rag-gateway": [
          "rag-gateway-aud",
          "gateway-claims"
        ]
      }
    }