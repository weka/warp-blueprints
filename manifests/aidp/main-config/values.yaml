image:
  repository: quay.io/keycloak/keycloak
  tag: "26.3.3"

command:
  - "/opt/keycloak/bin/kc.sh"
  - "start"

postgresql:
  enabled: false

extraEnv: |
  - name: KEYCLOAK_ADMIN
    value: admin
  - name: KEYCLOAK_ADMIN_PASSWORD
    value: Password123

  - name: KC_DB
    value: postgres
  - name: KC_DB_URL_HOST
    value: postgres
  - name: KC_DB_URL_PORT
    value: "5432"
  - name: KC_DB_URL_DATABASE
    value: keycloak
  - name: KC_DB_USERNAME
    value: keycloak
  - name: KC_DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: postgres-secret
        key: POSTGRES_PASSWORD

  # Hostname v2 CORRECT config
  - name: KC_HOSTNAME
    value: keycloak.example.com
  - name: KC_HOSTNAME_STRICT
    value: "true"

  # Tell Keycloak to trust forwarded headers
  - name: KC_PROXY
    value: "edge"
  - name: KC_PROXY_HEADERS
    value: "xforwarded"

  - name: KC_HTTP_ENABLED
    value: "true"
  - name: KC_HTTP_RELATIVE_PATH
    value: /auth

service:
  httpPort: 8080

resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 2Gi

startupProbe: ""
readinessProbe: ""
livenessProbe: ""